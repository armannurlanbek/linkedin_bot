services:
  api:
    build: .
    env_file: .env
    environment:
      # Assembled here from DB_PASSWORD (set in .env). The app reaches Postgres
      # through the host db-router (HAProxy), which always forwards to the
      # current cluster primary. Plaintext over the local Docker network — no SSL.
      DATABASE_URL_SYNC: postgresql://roman:${DB_PASSWORD}@db-router:5432/db_roman
      DATABASE_URL: postgresql+asyncpg://roman:${DB_PASSWORD}@db-router:5432/db_roman
    ports:
      # Localhost only — Cloudflare Tunnel serves this publicly, not direct exposure.
      - "127.0.0.1:8082:8000"
    networks:
      - orlanda
    restart: unless-stopped

networks:
  orlanda:
    external: true
