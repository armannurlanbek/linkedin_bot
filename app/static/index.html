        }
      }
    }

    // ════════════════════════════════════════════════════════════
    // SEND MESSAGE + SSE STREAMING
    // ════════════════════════════════════════════════════════════

    const BTN_BASE = 'shrink-0 flex items-center gap-1.5 text-white text-sm font-medium rounded-xl px-4 py-2.5 transition';
    function updateSendStopButton() {
      const isStreamingHere = chatStreams.has(activeChatId);
      sendBtn.style.display = ''; // ensure always visible (voice input may have hidden it)
      if (isStreamingHere) {
        sendBtn.className = `${BTN_BASE} bg-red-600 hover:bg-red-500 active:bg-red-700`;
        sendBtn.innerHTML = '<span>Stop</span><span class="text-base leading-none">■</span>';
      } else {
        sendBtn.className = `${BTN_BASE} bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700`;
        sendBtn.innerHTML = '<span>Send</span><span class="text-base leading-none">↩</span>';
      }
    }

    function editMessage(text, messageId) {
      if (chatStreams.has(activeChatId)) return;
      inputArea.value = text;
      inputArea.style.height = 'auto';
      inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
      editingFromMessageId = messageId;

      // Restore original attachments into the pending strip
      _clearAttachments();
      const savedAttachments = messageAttachmentsMap.get(String(messageId)) || [];
      for (const a of savedAttachments) {
        let objectUrl = a.objectUrl || null;
        // For images from history that have no live objectUrl, derive one from base64
        if (!objectUrl && a.block?.type === 'image' && a.block?.source?.data) {
          const bytes = Uint8Array.from(atob(a.block.source.data), c => c.charCodeAt(0));
          objectUrl = URL.createObjectURL(new Blob([bytes], { type: a.block.source.media_type }));
        }
        pendingAttachments.push({ ...a, objectUrl });
        attachStrip.appendChild(_makeChip(a.name, a.kind, objectUrl));
      }
      if (pendingAttachments.length > 0) attachStrip.classList.remove('hidden');

      inputArea.classList.add('editing-mode');
      inputArea.focus();
    }

    async function sendMessage() {
      const text = inputArea.value.trim();
      if ((!text && pendingAttachments.length === 0) || chatStreams.has(activeChatId)) return;

      // Edit-and-resend: truncate DB + remove DOM from that message onward
      if (editingFromMessageId && activeChatId) {
        inputArea.classList.remove('editing-mode');
        try {
          await apiDelete(`/api/chats/${activeChatId}/messages/since/${editingFromMessageId}`);
          const panel = chatPanels[String(activeChatId)];
          if (panel) {
            let removing = false;
            [...panel.children].forEach(child => {
              if (!removing && child.dataset?.messageId === String(editingFromMessageId)) removing = true;
              if (removing) child.remove();
            });
          }
        } catch (e) {
          console.error('Failed to truncate messages for edit', e);
        }
        editingFromMessageId = null;
      }

      if (!activeChatId) {
        try {
          const chat = await apiPost('/api/chats', {});
          renderSidebarItem(chat);
          activeChatId = String(chat.id);
          setActiveSidebarItem(activeChatId);
        } catch (e) {
          console.error('Failed to create chat', e);
          return;
        }
      }

      const thisChatId = activeChatId;
      const panel = getOrCreatePanel(thisChatId);
      const snapshotAttachments = pendingAttachments.slice();
      const userMsgWrap = appendUserMessage(text, panel, null, snapshotAttachments);
      _clearAttachments();
      inputArea.value = '';
      inputArea.style.height = '';

      const ctrl = new AbortController();
      chatStreams.set(thisChatId, ctrl);
      updateSendStopButton();
      inputArea.disabled = true;
      // Show streaming dot on sidebar item
      const streamItem = document.getElementById(`chat-item-${thisChatId}`);
      if (streamItem && !streamItem.querySelector('.chat-streaming-dot')) {
        const dot = document.createElement('div');
        dot.className = 'chat-streaming-dot';
        streamItem.insertBefore(dot, streamItem.querySelector('.delete-btn'));
      }

      const shell = createAssistantMessageShell(panel);

      try {
        const resp = await fetch(`/api/chats/${thisChatId}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, attachments: snapshotAttachments.map(a => a.block) }),
          signal: ctrl.signal,
        });

        if (!resp.ok) {
          let detail = `Server error ${resp.status}`;
          try { const j = await resp.json(); if (j.detail) detail = j.detail; } catch {}
          shell.showError(detail);
          chatStreams.delete(thisChatId);
          if (activeChatId === thisChatId) { updateSendStopButton(); inputArea.disabled = false; }
          return;
        }

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(part.slice(6)); } catch { continue; }
            if (event.type === 'user_message_id') {
              userMsgWrap.dataset.messageId = String(event.id);
              if (snapshotAttachments.length > 0) messageAttachmentsMap.set(String(event.id), snapshotAttachments);
              const editBtn = document.createElement('button');
              editBtn.className = 'text-xs text-slate-400 hover:text-amber-500 transition';
              editBtn.style.cssText = 'opacity:0;font-size:11px';
              editBtn.textContent = '✏️ Edit & resend';
              editBtn.addEventListener('click', () => editMessage(text, event.id));
              userMsgWrap.addEventListener('mouseenter', () => { editBtn.style.opacity = '1'; });
              userMsgWrap.addEventListener('mouseleave', () => { editBtn.style.opacity = '0'; });
              userMsgWrap.appendChild(editBtn);
              continue;
            }
            handleSSEEvent(event, shell, thisChatId);
          }
        }

      } catch (e) {
        if (e.name === 'AbortError') {
          shell.finalize();
        } else if (e.name === 'TypeError' || /load failed|failed to fetch|network\s*error/i.test(e.message || '')) {
          // Network drop / Safari killed the fetch (e.g. app backgrounded mid-stream).
          // The backend finishes and saves the reply regardless; mark for refresh-on-return.
          interruptedChats.add(thisChatId);
          shell.markBackground();
        } else {
          shell.showError(e.message || 'Network error');
        }
      } finally {
        chatStreams.delete(thisChatId);
        // Remove streaming dot from sidebar item
        const doneItem = document.getElementById(`chat-item-${thisChatId}`);
        if (doneItem) doneItem.querySelector('.chat-streaming-dot')?.remove();
        if (activeChatId === thisChatId) {
          updateSendStopButton();
          inputArea.disabled = false;
          inputArea.focus();
        }
      }
    }

    function handleSSEEvent(event, shell, thisChatId) {
      switch (event.type) {
        case 'thinking_delta':
          shell.appendThinking(event.text || '');
          break;
        case 'tool_call':
          shell.movePendingToNotes();
          shell.finalizeThinking();
          shell.addToolCall(event.id, event.tool, summariseInput(event.input));
          break;
        case 'tool_result':
          shell.resolveToolCall(event.id, event.preview || '', event.images || []);
          break;
        case 'linkedin_disambiguation':
          shell.addDisambiguation(event.company, event.candidates || []);
          break;
        case 'linkedin_resolved':
          shell.addLinkedInResolved(event.company, event.url);
          break;
        case 'text_delta':
          shell.finalizeThinking();
          shell.appendText(event.text || '');
          break;
        case 'title':
          if (event.title) {
            if (activeChatId === String(thisChatId))
              document.title = `${event.title} — Roman's Agent`;
            updateSidebarTitle(thisChatId, event.title);
          }
          break;
        case 'thumbnail':
          if (event.url) updateSidebarThumbnail(thisChatId, event.url);
          break;
        case 'done':
          shell.finalize();
          break;
        case 'error':
          shell.showError(event.message || 'An error occurred');
          break;
        default:
          break;
      }
    }

    // ════════════════════════════════════════════════════════════
    // INPUT EVENT WIRING
    // ════════════════════════════════════════════════════════════

    sendBtn.addEventListener('click', () => {
      const ctrl = chatStreams.get(activeChatId);
      if (ctrl) {
        ctrl.abort();
      } else {
        sendMessage();
      }
    });

    inputArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputArea.addEventListener('input', () => {
      inputArea.style.height = 'auto';
      inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
    });

    newChatBtn.addEventListener('click', createNewChat);

    // ════════════════════════════════════════════════════════════
    // MOBILE DRAWER
    // ════════════════════════════════════════════════════════════

    function openSidebar() {
      sidebar.classList.add('open');
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }
    menuToggle.addEventListener('click', openSidebar);
    backdrop.addEventListener('click', closeSidebar);

    // ════════════════════════════════════════════════════════════
    // SIDEBAR TABS
    // ════════════════════════════════════════════════════════════

    function switchTab(tab) {
      currentTab = tab;
      tabChats.classList.toggle('active', tab === 'chats');
      tabLibrary.classList.toggle('active', tab === 'library');
      newChatWrap.style.display = tab === 'chats' ? '' : 'none';
      if (tab === 'library') {
        renderLibraryList();
      } else {
        loadChatList();
      }
    }
    tabChats.addEventListener('click', () => switchTab('chats'));
    tabLibrary.addEventListener('click', () => switchTab('library'));

    // ════════════════════════════════════════════════════════════
    // LIBRARY
    // ════════════════════════════════════════════════════════════

    async function renderLibraryList() {
      try {
        const items = await apiGet('/api/library');
        sidebarList.innerHTML = '';
        if (items.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'text-xs text-slate-500 px-3 py-4 text-center';
          empty.textContent = 'No saved posts yet.';
          sidebarList.appendChild(empty);
          return;
        }
        items.forEach(item => sidebarList.appendChild(renderLibraryItem(item)));
      } catch (e) {
        console.error('Failed to load library', e);
      }
    }

    function renderLibraryItem(item) {
      const el = document.createElement('div');
      el.className = 'library-item rounded-lg px-3 py-2.5 mb-1 cursor-pointer';
      el.dataset.libId = item.id;

      const preview = document.createElement('p');
      preview.className = 'text-xs text-slate-300 leading-relaxed line-clamp-3 mb-2';
      preview.style.cssText = 'display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden';
      preview.textContent = item.text;

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-1.5 flex-wrap';

      const statusBadge = document.createElement('span');
      statusBadge.className = `lib-status-badge ${item.status}`;
      statusBadge.textContent = item.status;

      if (item.promoted) {
        const promBadge = document.createElement('span');
        promBadge.className = 'lib-status-badge promoted';
        promBadge.textContent = '✓ archive';
        meta.appendChild(promBadge);
      }

      const date = document.createElement('span');
      date.className = 'text-[10px] text-slate-500 ml-auto';
      date.textContent = item.created_at ? new Date(item.created_at).toLocaleDateString('he-IL') : '';

      meta.appendChild(statusBadge);
      meta.appendChild(date);
      el.appendChild(preview);
      el.appendChild(meta);

      // Actions row
      const actions = document.createElement('div');
      actions.className = 'flex gap-2 mt-2';

      const copyBtn2 = document.createElement('button');
      copyBtn2.className = 'text-[11px] text-slate-400 hover:text-indigo-400 transition';
      copyBtn2.textContent = '📋';
      copyBtn2.title = 'Copy';
      copyBtn2.addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard.writeText(item.text).then(() => { copyBtn2.textContent = '✓'; setTimeout(() => copyBtn2.textContent = '📋', 1500); });
      });

      const postBtn = document.createElement('button');
      postBtn.className = 'text-[11px] text-slate-400 hover:text-green-400 transition';
      postBtn.title = item.status === 'posted' ? 'Mark as draft' : 'Mark as posted';
      postBtn.textContent = item.status === 'posted' ? '↩ Draft' : '✅ Posted';
      postBtn.addEventListener('click', async e => {
        e.stopPropagation();
        const newStatus = item.status === 'posted' ? 'draft' : 'posted';
        try {
          const updated = await apiPatch(`/api/library/${item.id}`, { status: newStatus });
          item.status = updated.status;
          item.posted_at = updated.posted_at;
          statusBadge.className = `lib-status-badge ${updated.status}`;
          statusBadge.textContent = updated.status;
          postBtn.textContent = updated.status === 'posted' ? '↩ Draft' : '✅ Posted';
          postBtn.title = updated.status === 'posted' ? 'Mark as draft' : 'Mark as posted';
        } catch (err) { console.error(err); }
      });

      const archiveBtn = document.createElement('button');
      archiveBtn.className = 'text-[11px] transition ' + (item.promoted ? 'text-violet-400 cursor-default' : 'text-slate-400 hover:text-violet-400');
      archiveBtn.textContent = item.promoted ? '✓ archive' : '🎓 archive';
      archiveBtn.title = item.promoted ? 'Already in style archive' : 'Add to style archive';
      archiveBtn.disabled = item.promoted;
      archiveBtn.addEventListener('click', async e => {
        e.stopPropagation();
        if (item.promoted) return;
        const ok = confirm('Add to style archive? The bot will learn to write like this post.');
        if (!ok) return;
        try {
          await apiPost(`/api/library/${item.id}/promote`, {});
          item.promoted = true;
          archiveBtn.textContent = '✓ archive';
          archiveBtn.className = 'text-[11px] text-violet-400 cursor-default';
          archiveBtn.disabled = true;
          const promBadge = document.createElement('span');
          promBadge.className = 'lib-status-badge promoted';
          promBadge.textContent = '✓ archive';
          meta.insertBefore(promBadge, date);
        } catch (err) { console.error(err); }
      });

      const delBtn2 = document.createElement('button');
      delBtn2.className = 'text-[11px] text-slate-500 hover:text-red-400 transition ml-auto';
      delBtn2.textContent = '🗑';
      delBtn2.title = 'Delete';
      delBtn2.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Delete this saved post?')) return;
        try {
          await apiDelete(`/api/library/${item.id}`);
          el.remove();
        } catch (err) { console.error(err); }
      });

      actions.appendChild(copyBtn2);
      actions.appendChild(postBtn);
      actions.appendChild(archiveBtn);
      actions.appendChild(delBtn2);
      el.appendChild(actions);

      return el;
    }

    // Called from assistant message shell to save a post
    async function saveToLibrary(text, chatId) {
      try {
        const result = await apiPost('/api/library', { text, chat_id: chatId ? Number(chatId) : null });
        return result;
      } catch (e) {
        console.error('Failed to save to library', e);
        return null;
      }
    }

    // ════════════════════════════════════════════════════════════
    // AUTH
    // ════════════════════════════════════════════════════════════

    const authModal  = document.getElementById('auth-modal');
    const authInput  = document.getElementById('auth-input');
    const authSubmit = document.getElementById('auth-submit');
    const authError  = document.getElementById('auth-error');

    function showAuthModal() {
      authModal.classList.add('open');
      setTimeout(() => authInput.focus(), 50);
    }
    function hideAuthModal() {
      authModal.classList.remove('open');
      authInput.value = '';
      authError.classList.add('hidden');
    }

    async function submitLogin() {
      const pw = authInput.value.trim();
      if (!pw) return;
      authSubmit.disabled = true;
      authSubmit.textContent = 'Signing in…';
      try {
        await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        }).then(async r => {
          if (!r.ok) {
            authError.textContent = 'Wrong password';
            authError.classList.remove('hidden');
            return;
          }
          hideAuthModal();
          loadChatList();
        });
      } catch (e) {
        authError.textContent = 'Network error';
        authError.classList.remove('hidden');
      } finally {
        authSubmit.disabled = false;
        authSubmit.textContent = 'Sign in';
      }
    }

    authSubmit.addEventListener('click', submitLogin);
    authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitLogin(); });

    // ════════════════════════════════════════════════════════════
    // ATTACHMENTS
    // ════════════════════════════════════════════════════════════

    const attachBtn   = document.getElementById('attach-btn');
    const attachInput = document.getElementById('attach-input');
    const attachStrip = document.getElementById('attach-strip');

    let pendingAttachments = []; // [{block, name, kind, objectUrl?}]

    attachBtn.addEventListener('click', () => attachInput.click());
    attachInput.addEventListener('change', handleAttachFiles);

    const MAX_ATTACHMENTS = 10;

    async function handleAttachFiles(e) {
      const files = Array.from(e.target.files || []);
      attachInput.value = '';
      for (const file of files) {
        if (pendingAttachments.length >= MAX_ATTACHMENTS) {
          alert(`Maximum ${MAX_ATTACHMENTS} attachments per message.`);
          break;
        }
        const form = new FormData();
        form.append('file', file, file.name);
        try {
          const r = await fetch('/api/upload', { method: 'POST', body: form });
          if (r.status === 401) { showAuthModal(); return; }
          if (!r.ok) {
            const j = await r.json().catch(() => ({}));
            alert(`Could not attach ${file.name}: ${j.detail || r.status}`);
            continue;
          }
          const { block, name, kind } = await r.json();
          const objectUrl = kind === 'image' ? URL.createObjectURL(file) : null;
          pendingAttachments.push({ block, name, kind, objectUrl });
          attachStrip.appendChild(_makeChip(name, kind, objectUrl));
          attachStrip.classList.remove('hidden');
        } catch (err) {
          alert(`Failed to upload ${file.name}`);
        }
      }
    }

    function _makeChip(name, kind, objectUrl) {
      const chip = document.createElement('div');
      chip.className = 'attach-chip';

      if (kind === 'image' && objectUrl) {
        const img = document.createElement('img');
        img.src = objectUrl;
        img.alt = name;
        chip.appendChild(img);
      } else {
        const icon = document.createElement('span');
        icon.textContent = kind === 'pdf' ? '📄' : kind === 'docx' ? '📝' : '📃';
        icon.style.fontSize = '20px';
        chip.appendChild(icon);
      }

      const label = document.createElement('span');
      label.className = 'chip-name';
      label.textContent = name;
      chip.appendChild(label);

      const rm = document.createElement('span');
      rm.className = 'chip-remove';
      rm.textContent = '✕';
      rm.title = 'Remove';
      rm.addEventListener('click', () => {
        const pos = [...attachStrip.children].indexOf(chip);
        if (pos >= 0) {
          if (pendingAttachments[pos]?.objectUrl) URL.revokeObjectURL(pendingAttachments[pos].objectUrl);
          pendingAttachments.splice(pos, 1);
        }
        chip.remove();
        if (attachStrip.children.length === 0) attachStrip.classList.add('hidden');
      });
      chip.appendChild(rm);
      return chip;
    }

    function _clearAttachments() {
      pendingAttachments.forEach(a => { if (a.objectUrl) URL.revokeObjectURL(a.objectUrl); });
      pendingAttachments = [];
      attachStrip.innerHTML = '';
      attachStrip.classList.add('hidden');
    }

    // ════════════════════════════════════════════════════════════
    // VOICE INPUT
    // ════════════════════════════════════════════════════════════

    const micBtn       = document.getElementById('mic-btn');
    const voiceBar     = document.getElementById('voice-bar');
    const voiceWave    = document.getElementById('voice-wave');
    const voiceStatus  = document.getElementById('voice-status');

    const _MIC_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
    const _STOP_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`;
    const _SPIN_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg>`;

    let _recorder = null;
    let _chunks   = [];
    let _waveRaf  = null;
    let _micStream = null;
    let _audioCtx  = null;

    function _drawWave(analyser) {
      const ctx = voiceWave.getContext('2d');
      const W = voiceWave.width, H = voiceWave.height;
      const bufLen = analyser.frequencyBinCount;
      const data = new Uint8Array(bufLen);
      const BAR = 3, COUNT = Math.floor(W / (BAR + 3));
      const GAP = (W - COUNT * BAR) / (COUNT + 1);
      function frame() {
        _waveRaf = requestAnimationFrame(frame);
        analyser.getByteFrequencyData(data);
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < COUNT; i++) {
          const v = data[Math.floor(i * bufLen / COUNT)] / 255;
          const h = Math.max(4, v * (H - 4));
          const x = GAP + i * (BAR + GAP);
          const y = (H - h) / 2;
          const g = ctx.createLinearGradient(x, y, x, y + h);
          g.addColorStop(0, '#a5b4fc'); g.addColorStop(1, '#6366f1');
          ctx.fillStyle = g;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(x, y, BAR, h, 1.5);
          else ctx.rect(x, y, BAR, h);
          ctx.fill();
        }
      }
      frame();
    }

    async function _startVoice() {
      try {
        _micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        alert('Microphone access denied. Please allow microphone in browser settings.');
        return;
      }
      _audioCtx = new AudioContext();
      const analyser = _audioCtx.createAnalyser();
      analyser.fftSize = 256;
      _audioCtx.createMediaStreamSource(_micStream).connect(analyser);

      _chunks = [];
      _recorder = new MediaRecorder(_micStream);
      _recorder.ondataavailable = e => { if (e.data.size > 0) _chunks.push(e.data); };
      _recorder.onstop = _handleStop;
      _recorder.start();

      // Swap textarea → voice bar
      inputArea.style.display = 'none';
      sendBtn.style.display = 'none';
      voiceBar.classList.remove('hidden');
      voiceWave.width  = voiceBar.clientWidth - 80;
      voiceWave.height = 32;
      voiceStatus.textContent = '● REC';
      micBtn.innerHTML = _STOP_SVG;
      micBtn.classList.add('recording');
      _drawWave(analyser);
    }

    function _stopVoice() {
      if (_recorder?.state === 'recording') _recorder.stop();
      _micStream?.getTracks().forEach(t => t.stop());
      cancelAnimationFrame(_waveRaf);
      _audioCtx?.close();
      micBtn.innerHTML = _SPIN_SVG;
      micBtn.classList.remove('recording');
      micBtn.classList.add('transcribing');
      voiceStatus.textContent = 'Transcribing…';
    }

    async function _handleStop() {
      const mime = _recorder.mimeType || 'audio/webm';
      const blob = new Blob(_chunks, { type: mime });
      const ext  = mime.includes('ogg') ? '.ogg' : mime.includes('mp4') ? '.mp4' : '.webm';
      const form = new FormData();
      form.append('file', blob, `voice${ext}`);
      try {
        const r = await fetch('/api/transcribe', { method: 'POST', body: form });
        if (r.status === 401) { showAuthModal(); return; }
        if (!r.ok) throw new Error(`${r.status}`);
        const { text } = await r.json();
        if (text) {
          const existing = inputArea.value.trim();
          inputArea.value = existing ? existing + ' ' + text : text;
          inputArea.style.height = 'auto';
          inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
        }
      } catch (e) {
        console.error('Transcription error', e);
      } finally {
        voiceBar.classList.add('hidden');
        inputArea.style.display = '';
        sendBtn.style.display = '';
        micBtn.innerHTML = _MIC_SVG;
        micBtn.classList.remove('transcribing');
        micBtn.disabled = false;
        inputArea.focus();
      }
    }

    micBtn.addEventListener('click', () => {
      if (_recorder?.state === 'recording') _stopVoice();
      else _startVoice();
    });

    // ════════════════════════════════════════════════════════════
    // BOOT
    // ════════════════════════════════════════════════════════════

    async function boot() {
      try {
        const r = await fetch('/api/auth/check');
        const data = await r.json();
        if (!data.authenticated) {
          showAuthModal();
          return;
        }
      } catch (e) {
        // No auth configured or network error — proceed
      }
      loadChatList();
    }

    boot();

  })();
  </script>
