<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Bot</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Base typography ──────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: "cv02","cv03","cv04","cv11";
    }

    /* ── Hebrew post font ─────────────────────────────────────── */
    .hebrew-text {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
      white-space: pre-wrap;
      direction: rtl;
      text-align: right;
      line-height: 1.85;
      letter-spacing: 0.01em;
    }
    [dir="rtl"], [lang="he"] {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
    }

    /* ── Spinner ──────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar { background: #0f172a; }
    #sidebar-list::-webkit-scrollbar { width: 4px; }
    #sidebar-list::-webkit-scrollbar-track { background: transparent; }
    #sidebar-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .chat-item {
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.06); border-left-color: #6366f1; }
    .chat-item.active { background: rgba(99,102,241,0.15); border-left-color: #818cf8; color: #fff; }
    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }

    /* ── Message panel scrollbar ──────────────────────────────── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    /* ── Textarea auto-grow ───────────────────────────────────── */
    #input-area {
      field-sizing: content;
      max-height: 96px;
      overflow-y: auto;
      resize: none;
    }

    /* ── User bubble gradient ─────────────────────────────────── */
    .user-bubble {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
    }

    /* ── Post card accent bar ─────────────────────────────────── */
    .post-card-accent {
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    }

    /* ── Tool trace collapse animation ───────────────────────── */
    .trace-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .trace-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }
    .trace-wrap {
      border-left: 3px solid #e2e8f0;
    }

    /* ── Copy flash ───────────────────────────────────────────── */
    .copy-success { background-color: #16a34a !important; color: #fff !important; border-color: #16a34a !important; }

    /* ── Thinking animation ───────────────────────────────────── */
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }
    .thinking-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #a78bfa;
      margin: 0 1px;
      vertical-align: middle;
    }
    .thinking-dot:nth-child(1) { animation: dot-pulse 1.4s ease-in-out infinite; }
    .thinking-dot:nth-child(2) { animation: dot-pulse 1.4s ease-in-out 0.2s infinite; }
    .thinking-dot:nth-child(3) { animation: dot-pulse 1.4s ease-in-out 0.4s infinite; }
    .thinking-dots-active .thinking-dot { animation-play-state: running; }
    .thinking-dots-done .thinking-dot   { animation-play-state: paused; opacity: 0.3; }

    @keyframes thought-appear {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .thought-line {
      animation: thought-appear 0.3s ease forwards;
      opacity: 0;
    }

    /* ── Thinking section collapse ───────────────────────────── */
    .thinking-body {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .thinking-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    /* ── Image grid hover overlay ─────────────────────────────── */
    .img-thumb-wrap { position: relative; overflow: hidden; border-radius: 8px; }
    .img-thumb-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      font-size: 18px; color: white;
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-100 text-slate-800 antialiased">

  <!-- ══════════════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="w-64 shrink-0 flex flex-col text-slate-100 h-full">

    <!-- Brand -->
    <div class="px-5 pt-5 pb-4 border-b border-white/10">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-base shrink-0">🏢</div>
        <div>
          <h1 class="text-sm font-semibold tracking-tight text-white">LinkedIn Bot</h1>
          <p class="text-[11px] text-slate-400 mt-0">Hebrew post generator</p>
        </div>
      </div>
    </div>

    <!-- New chat button -->
    <div class="px-4 py-3">
      <button
        id="new-chat-btn"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-sm font-medium text-white transition"
      >
        <span class="text-lg leading-none">+</span>
        <span>New Chat</span>
      </button>
    </div>

    <!-- Chat list -->
    <div id="sidebar-list" class="flex-1 overflow-y-auto px-3 py-1 space-y-0.5">
      <!-- items injected by JS -->
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════════
       MAIN PANEL
  ══════════════════════════════════════════════════════════════ -->
  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">

    <!-- Message list -->
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-6">

      <!-- Empty state -->
      <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center select-none">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl mb-5">✍️</div>
        <p class="text-xl font-semibold text-slate-700" dir="rtl" lang="he">בוא נכתוב פוסט חדש</p>
        <p class="text-sm text-slate-400 mt-2 max-w-xs" dir="rtl" lang="he">
          הדבק URL של כתבה או בניין — הסוכן יחקור, ימצא, ויכתוב בסגנון שלך
        </p>
      </div>

    </div>

    <!-- Input bar -->
    <div class="border-t border-slate-200 px-4 py-3 flex items-end gap-3 bg-white shadow-sm">
      <textarea
        id="input-area"
        rows="1"
        placeholder="הדבק URL או כתוב הוראה..."
        dir="auto"
        class="flex-1 rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
      ></textarea>
      <button
        id="send-btn"
        class="shrink-0 flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium rounded-xl px-4 py-2.5 transition disabled:opacity-40 disabled:cursor-not-allowed"
      >
        <span>Send</span>
        <span class="text-base">↩</span>
      </button>
    </div>
  </main>

  <!-- ══════════════════════════════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // ── DOM refs ────────────────────────────────────────────────
    const sidebarList  = document.getElementById('sidebar-list');
    const newChatBtn   = document.getElementById('new-chat-btn');
    const messages     = document.getElementById('messages');
    const emptyState   = document.getElementById('empty-state');
    const inputArea    = document.getElementById('input-area');
    const sendBtn      = document.getElementById('send-btn');

    // ── App state ───────────────────────────────────────────────
    let activeChatId    = null;
    let streamingChatId = null; // which chat is currently streaming
    const chatPanels    = {};   // chatId → panel DOM element

    // ── Tool metadata ────────────────────────────────────────────
    const TOOL_EMOJI = {
      scrape_url:            '🔍',
      search_web:            '🌐',
      retrieve_similar_posts:'📚',
    };
    function toolEmoji(name) { return TOOL_EMOJI[name] || '⚙️'; }

    // ════════════════════════════════════════════════════════════
    // SMART SCROLL — only auto-scroll when near bottom
    // ════════════════════════════════════════════════════════════

    function scrollToBottom(force = false) {
      const threshold = 150;
      const nearBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight < threshold;
      if (force || nearBottom) {
        messages.scrollTop = messages.scrollHeight;
      }
    }

    // ════════════════════════════════════════════════════════════
    // CHAT PANELS — one panel per chat, kept in DOM for background streaming
    // ════════════════════════════════════════════════════════════

    function getOrCreatePanel(chatId) {
      const key = String(chatId);
      if (!chatPanels[key]) {
        const panel = document.createElement('div');
        panel.className = 'chat-panel w-full space-y-6';
        panel.style.display = 'none';
        messages.insertBefore(panel, emptyState);
        chatPanels[key] = panel;
      }
      return chatPanels[key];
    }

    function showPanel(chatId) {
      const key = String(chatId);
      Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
      const panel = chatPanels[key];
      if (panel && panel.children.length > 0) {
        panel.style.display = '';
        emptyState.style.display = 'none';
      } else {
        emptyState.style.display = '';
      }
    }

    function deletePanel(chatId) {
      const key = String(chatId);
      if (chatPanels[key]) {
        chatPanels[key].remove();
        delete chatPanels[key];
      }
    }

    // ════════════════════════════════════════════════════════════
    // SIDEBAR
    // ════════════════════════════════════════════════════════════

    function renderSidebarItem(chat) {
      const existing = document.getElementById(`chat-item-${chat.id}`);
      if (existing) {
        const titleEl = existing.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = chat.title || 'Untitled';
        return existing;
      }

      const item = document.createElement('div');
      item.id = `chat-item-${chat.id}`;
      item.dataset.chatId = chat.id;
      item.className = 'chat-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm text-slate-300 pl-3';

      const title = document.createElement('span');
      title.className = 'chat-title flex-1 truncate';
      title.textContent = chat.title || 'Untitled';

      const del = document.createElement('button');
      del.className = 'delete-btn shrink-0 text-slate-500 hover:text-red-400 text-xs px-1 transition';
      del.textContent = '×';
      del.title = 'Delete chat';
      del.addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteChat(chat.id);
      });

      item.appendChild(title);
      item.appendChild(del);
      item.addEventListener('click', () => loadChat(chat.id));

      sidebarList.prepend(item);
      return item;
    }

    function setActiveSidebarItem(chatId) {
      document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', el.dataset.chatId === String(chatId));
      });
    }

    function updateSidebarTitle(chatId, title) {
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) {
        const titleEl = item.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = title;
      }
    }

    // ════════════════════════════════════════════════════════════
    // RENDERING HELPERS
    // ════════════════════════════════════════════════════════════

    function appendUserMessage(text, panel) {
      const target = panel || getOrCreatePanel(activeChatId);
      emptyState.style.display = 'none';
      target.style.display = '';

      const wrap = document.createElement('div');
      wrap.className = 'flex justify-end';

      const bubble = document.createElement('div');
      bubble.className = 'user-bubble max-w-lg text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm whitespace-pre-wrap shadow-sm';
      bubble.style.fontFamily = "'Heebo', sans-serif";
      bubble.textContent = text;

      wrap.appendChild(bubble);
      target.appendChild(wrap);
      scrollToBottom(true);
      return wrap;
    }

    function renderBold(raw) {
      const escaped = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
    }

    // ════════════════════════════════════════════════════════════
    // IMAGE GRID
    // ════════════════════════════════════════════════════════════

    function buildImageGrid(images) {
      const LIMIT = 4;
      const shown = images.slice(0, LIMIT);
      const extra = images.slice(LIMIT);

      const grid = document.createElement('div');
      const single = shown.length === 1;
      grid.className = single
        ? 'w-full'
        : 'w-full grid grid-cols-2 gap-2';

      function makeThumb(src) {
        const wrap = document.createElement('div');
        wrap.className = 'img-thumb-wrap min-w-0';

        const a = document.createElement('a');
        a.href = src; a.target = '_blank'; a.rel = 'noopener noreferrer';

        const img = document.createElement('img');
        img.src = src;
        img.loading = 'lazy';
        img.className = single
          ? 'w-full max-h-64 rounded-lg object-cover border border-slate-200'
          : 'w-full h-40 object-cover border border-slate-200';
        img.onerror = () => wrap.remove();

        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        overlay.textContent = '↗';

        a.appendChild(img);
        wrap.appendChild(a);
        wrap.appendChild(overlay);
        return wrap;
      }

      shown.forEach(src => grid.appendChild(makeThumb(src)));

      if (extra.length > 0) {
        const moreBtn = document.createElement('button');
        moreBtn.className = 'col-span-2 text-xs text-indigo-600 hover:text-indigo-800 font-medium py-1 transition';
        moreBtn.textContent = `+${extra.length} more images`;
        moreBtn.addEventListener('click', () => {
          extra.forEach(src => grid.insertBefore(makeThumb(src), moreBtn));
          moreBtn.remove();
        });
        grid.appendChild(moreBtn);
      }

      return grid;
    }

    // ════════════════════════════════════════════════════════════
    // ASSISTANT MESSAGE SHELL
    // ════════════════════════════════════════════════════════════

    function createAssistantMessageShell(panel) {
      const target = panel || getOrCreatePanel(activeChatId);
      emptyState.style.display = 'none';
      target.style.display = '';

      const wrap = document.createElement('div');
      wrap.className = 'flex flex-col gap-3 max-w-2xl';

      // ── Thinking section ──────────────────────────────────────
      const thinkingSection = document.createElement('div');
      thinkingSection.className = 'rounded-xl border border-violet-200 overflow-hidden hidden';
      thinkingSection.style.background = '#faf5ff';

      const thinkingHeader = document.createElement('button');
      thinkingHeader.className = 'w-full flex items-center justify-between px-4 py-2.5 hover:bg-violet-100 transition text-xs font-medium text-violet-600 text-left';
      thinkingHeader.style.background = '#f5f3ff';
      thinkingHeader.innerHTML = `
        <span class="thinking-label flex items-center gap-2">
          <span>💭</span>
          <span class="thinking-status">Thinking</span>
          <span class="thinking-dots thinking-dots-active">
            <span class="thinking-dot"></span>
            <span class="thinking-dot"></span>
            <span class="thinking-dot"></span>
          </span>
        </span>
        <span class="thinking-chevron text-violet-400 transition-transform duration-200">▲</span>
      `;

      const thinkingBody = document.createElement('div');
      thinkingBody.className = 'thinking-body px-4 py-3 space-y-1 font-mono text-xs text-violet-700 leading-relaxed';
      thinkingBody.style.cssText = 'max-height:280px;opacity:1;background:#faf5ff';

      let thinkingOpen = true;
      thinkingHeader.addEventListener('click', () => {
        thinkingOpen = !thinkingOpen;
        if (thinkingOpen) {
          thinkingBody.style.maxHeight = '280px';
          thinkingBody.style.opacity = '1';
          thinkingBody.classList.remove('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = '';
        } else {
          thinkingBody.classList.add('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
        }
      });

      thinkingSection.appendChild(thinkingHeader);
      thinkingSection.appendChild(thinkingBody);

      let postText = '';
      let thinkingBuffer = '';
      let thinkingFinalized = false;
      let currentThoughtLine = null;

      // ── Tool trace ────────────────────────────────────────────
      const traceWrap = document.createElement('div');
      traceWrap.className = 'trace-wrap rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm';

      const traceHeader = document.createElement('button');
      traceHeader.className = 'w-full flex items-center justify-between px-4 py-2 bg-slate-50 hover:bg-slate-100 transition text-xs font-medium text-slate-500 text-left';
      traceHeader.innerHTML = `
        <span class="flex items-center gap-1.5">
          <span class="trace-status-icon inline-block w-3 h-3">
            <svg class="spinner w-3 h-3 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
          </span>
          <span class="text-slate-600 font-medium">Tool trace</span>
        </span>
        <span class="trace-chevron text-slate-400 transition-transform duration-200">▲</span>
      `;

      const traceBody = document.createElement('div');
      traceBody.className = 'trace-body px-4 py-2.5 space-y-1.5 bg-white';
      traceBody.style.cssText = 'max-height:500px;opacity:1';

      let traceOpen = true;
      traceHeader.addEventListener('click', () => {
        traceOpen = !traceOpen;
        if (traceOpen) {
          traceBody.style.maxHeight = '500px';
          traceBody.style.opacity = '1';
          traceBody.classList.remove('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = '';
        } else {
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
        }
      });

      traceWrap.appendChild(traceHeader);
      traceWrap.appendChild(traceBody);

      // ── Images section (outside trace, no overflow clipping) ──
      const imagesSection = document.createElement('div');
      imagesSection.className = 'w-full hidden';

      // ── Post card ─────────────────────────────────────────────
      const postCard = document.createElement('div');
      postCard.className = 'bg-white rounded-xl border border-slate-200 shadow-md overflow-hidden hidden';

      const postAccent = document.createElement('div');
      postAccent.className = 'post-card-accent';
      postCard.appendChild(postAccent);

      const postContent = document.createElement('div');
      postContent.className = 'hebrew-text px-5 py-4 text-[15px] text-slate-800 min-h-[80px]';
      postContent.setAttribute('lang', 'he');
      postContent.setAttribute('dir', 'rtl');
      postCard.appendChild(postContent);

      // ── Copy button ───────────────────────────────────────────
      const copyBtn = document.createElement('button');
      copyBtn.className = 'hidden self-end text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 border border-indigo-600 rounded-lg px-3 py-1.5 transition shadow-sm';
      copyBtn.textContent = 'העתק';
      copyBtn.addEventListener('click', async () => {
        const text = postContent.textContent;
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          Object.assign(ta.style, { position:'fixed', opacity:'0' });
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        copyBtn.textContent = 'הועתק ✓';
        copyBtn.classList.add('copy-success');
        setTimeout(() => {
          copyBtn.textContent = 'העתק';
          copyBtn.classList.remove('copy-success');
        }, 2000);
      });

      // ── Error display ─────────────────────────────────────────
      const errorEl = document.createElement('div');
      errorEl.className = 'hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';

      wrap.appendChild(thinkingSection);
      wrap.appendChild(traceWrap);
      wrap.appendChild(imagesSection);
      wrap.appendChild(postCard);
      wrap.appendChild(copyBtn);
      wrap.appendChild(errorEl);
      target.appendChild(wrap);
      scrollToBottom();

      // ── Mutator API ───────────────────────────────────────────
      const toolRows = {};

      return {
        addToolCall(id, toolName, inputSummary) {
          const row = document.createElement('div');
          row.className = 'flex items-start gap-2 text-xs text-slate-600 py-0.5';

          const statusEl = document.createElement('span');
          statusEl.className = 'shrink-0 mt-0.5';
          statusEl.innerHTML = `
            <svg class="spinner w-3 h-3 text-indigo-400 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>`;

          const nameEl = document.createElement('span');
          nameEl.className = 'font-semibold text-slate-700 shrink-0';
          nameEl.textContent = `${toolEmoji(toolName)} ${toolName}`;

          const inputEl = document.createElement('span');
          inputEl.className = 'text-slate-400 truncate min-w-0';
          inputEl.textContent = inputSummary;

          const previewEl = document.createElement('span');
          previewEl.className = 'ml-auto shrink-0 text-slate-400 italic hidden';

          row.appendChild(statusEl);
          row.appendChild(nameEl);
          row.appendChild(inputEl);
          row.appendChild(previewEl);
          traceBody.appendChild(row);

          toolRows[id] = { row, statusEl, previewEl };
          scrollToBottom();
        },

        resolveToolCall(id, preview, images = []) {
          const entry = toolRows[id];
          if (!entry) return;
          entry.statusEl.innerHTML = '<span class="text-green-500 font-bold">✓</span>';
          if (preview) {
            entry.previewEl.textContent = preview;
            entry.previewEl.classList.remove('hidden');
          }
          if (images && images.length > 0) {
            const grid = buildImageGrid(images);
            imagesSection.appendChild(grid);
            imagesSection.classList.remove('hidden');
            scrollToBottom();
          }
        },

        movePendingToNotes() {
          if (!postText.trim()) return;
          const note = document.createElement('div');
          note.className = 'text-xs text-slate-400 italic py-1 border-b border-slate-100 mb-1';
          note.textContent = postText.trim().slice(0, 300) + (postText.trim().length > 300 ? '…' : '');
          traceBody.insertBefore(note, traceBody.firstChild);
          postText = '';
          postContent.innerHTML = '';
          postCard.classList.add('hidden');
        },

        appendText(text) {
          postCard.classList.remove('hidden');
          postText += text;
          postContent.innerHTML = renderBold(postText);
          scrollToBottom();
        },

        finalize() {
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          copyBtn.classList.remove('hidden');
          scrollToBottom(true);
        },

        showError(msg) {
          errorEl.textContent = msg;
          errorEl.classList.remove('hidden');
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-red-500 font-bold text-xs">✗</span>';
        },

        appendThinking(text) {
          if (thinkingFinalized) return;
          thinkingSection.classList.remove('hidden');
          thinkingBuffer += text;

          const parts = thinkingBuffer.split('\n');
          for (let i = 0; i < parts.length - 1; i++) {
            const lineText = parts[i].trim();
            if (!lineText) continue;
            if (currentThoughtLine) currentThoughtLine = null;
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.textContent = lineText;
            thinkingBody.appendChild(line);
          }

          const partial = parts[parts.length - 1];
          if (partial) {
            if (!currentThoughtLine) {
              currentThoughtLine = document.createElement('div');
              currentThoughtLine.className = 'text-violet-400 opacity-70';
              thinkingBody.appendChild(currentThoughtLine);
            }
            currentThoughtLine.textContent = partial;
          }

          thinkingBuffer = partial;
          scrollToBottom();
        },

        finalizeThinking() {
          if (thinkingFinalized) return;
          thinkingFinalized = true;

          if (currentThoughtLine && currentThoughtLine.textContent.trim()) {
            currentThoughtLine.className = 'thought-line';
            currentThoughtLine = null;
          }

          const dotsEl = thinkingHeader.querySelector('.thinking-dots');
          if (dotsEl) {
            dotsEl.classList.remove('thinking-dots-active');
            dotsEl.classList.add('thinking-dots-done');
          }
          const statusEl = thinkingHeader.querySelector('.thinking-status');
          if (statusEl) statusEl.textContent = 'Thought for a moment';

          thinkingOpen = false;
          thinkingBody.classList.add('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
        },

        renderHistory(blocks) {
          if (!Array.isArray(blocks)) return;
          for (const block of blocks) {
            if (block.type === 'tool_use') {
              const inputSummary = Object.values(block.input || {}).join(' ').slice(0, 60);
              this.addToolCall(block.id, block.name, inputSummary);
              this.resolveToolCall(block.id, '');
            } else if (block.type === 'text' && block.text) {
              postCard.classList.remove('hidden');
              postText += block.text;
              postContent.innerHTML = renderBold(postText);
            } else if (block.type === 'thinking' && block.thinking) {
              thinkingSection.classList.remove('hidden');
              const line = document.createElement('div');
              line.className = 'text-violet-500 opacity-80';
              line.textContent = block.thinking.slice(0, 200) + (block.thinking.length > 200 ? '...' : '');
              thinkingBody.appendChild(line);
            }
          }
          if (!thinkingSection.classList.contains('hidden')) {
            const dotsEl = thinkingHeader.querySelector('.thinking-dots');
            if (dotsEl) { dotsEl.classList.remove('thinking-dots-active'); dotsEl.classList.add('thinking-dots-done'); }
            const statusEl = thinkingHeader.querySelector('.thinking-status');
            if (statusEl) statusEl.textContent = 'Thought for a moment';
            thinkingOpen = false;
            thinkingBody.classList.add('collapsed');
            thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
          }
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (postContent.textContent.trim()) copyBtn.classList.remove('hidden');
          if (Object.keys(toolRows).length === 0) traceWrap.classList.add('hidden');
        },
      };
    }

    // ════════════════════════════════════════════════════════════
    // API HELPERS
    // ════════════════════════════════════════════════════════════

    async function apiGet(path) {
      const r = await fetch(path);
      if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
      return r.json();
    }

    async function apiPost(path, body) {
      const r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
      return r.json();
    }

    async function apiDelete(path) {
      const r = await fetch(path, { method: 'DELETE' });
      if (!r.ok && r.status !== 204) throw new Error(`DELETE ${path} → ${r.status}`);
    }

    function summariseInput(input) {
      if (!input) return '';
      if (typeof input === 'string') return input.slice(0, 60);
      const vals = Object.values(input);
      if (!vals.length) return '';
      return String(vals[0]).slice(0, 60);
    }

    // ════════════════════════════════════════════════════════════
    // CHAT MANAGEMENT
    // ════════════════════════════════════════════════════════════

    async function loadChatList() {
      try {
        const chats = await apiGet('/api/chats');
        sidebarList.innerHTML = '';
        const sorted = [...chats].sort((a, b) =>
          new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at)
        );
        sorted.forEach(c => renderSidebarItem(c));
        if (sorted.length > 0) {
          loadChat(sorted[0].id);
        } else {
          emptyState.style.display = '';
        }
      } catch (e) {
        console.error('Failed to load chat list', e);
        emptyState.style.display = '';
      }
    }

    async function loadChat(chatId) {
      const key = String(chatId);
      activeChatId = key;
      setActiveSidebarItem(key);

      // If we have a cached panel (e.g. streaming in background), just show it
      if (chatPanels[key]) {
        showPanel(key);
        document.title = 'LinkedIn Bot';
        return;
      }

      try {
        const chat = await apiGet(`/api/chats/${chatId}`);
        document.title = chat.title ? `${chat.title} — LinkedIn Bot` : 'LinkedIn Bot';

        if (!chat.messages || chat.messages.length === 0) {
          showPanel(key); // shows empty state since no panel exists yet
          inputArea.focus();
          return;
        }

        const panel = getOrCreatePanel(key);

        for (const msg of chat.messages) {
          if (msg.role === 'user') {
            const content = msg.content;
            if (Array.isArray(content)) {
              const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n');
              if (text) appendUserMessage(text, panel);
            } else {
              appendUserMessage(content || msg.text || '', panel);
            }
          } else if (msg.role === 'assistant') {
            const shell = createAssistantMessageShell(panel);
            const content = msg.content;
            if (Array.isArray(content)) {
              shell.renderHistory(content);
            } else if (typeof content === 'string') {
              shell.renderHistory([{ type: 'text', text: content }]);
            }
          }
        }

        showPanel(key);
        scrollToBottom(true);
        inputArea.focus();
      } catch (e) {
        console.error('Failed to load chat', e);
        emptyState.style.display = '';
      }
    }

    async function createNewChat() {
      try {
        const chat = await apiPost('/api/chats', {});
        renderSidebarItem(chat);
        activeChatId = String(chat.id);
        setActiveSidebarItem(activeChatId);
        // Show empty state for the new chat
        Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
        emptyState.style.display = '';
        document.title = 'LinkedIn Bot';
        inputArea.focus();
      } catch (e) {
        console.error('Failed to create chat', e);
      }
    }

    async function deleteChat(chatId) {
      try {
        await apiDelete(`/api/chats/${chatId}`);
      } catch (e) {
        console.error('Failed to delete chat', e);
      }
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) item.remove();
      deletePanel(chatId);

      if (String(chatId) === activeChatId) {
        activeChatId = null;
        const firstItem = sidebarList.querySelector('.chat-item');
        if (firstItem) {
          loadChat(firstItem.dataset.chatId);
        } else {
          emptyState.style.display = '';
          document.title = 'LinkedIn Bot';
        }
      }
    }

    // ════════════════════════════════════════════════════════════
    // SEND MESSAGE + SSE STREAMING
    // ════════════════════════════════════════════════════════════

    function updateSendButton() {
      // Disable send only if this chat is the one streaming
      sendBtn.disabled = streamingChatId === activeChatId;
    }

    async function sendMessage() {
      const text = inputArea.value.trim();
      if (!text || streamingChatId === activeChatId) return;

      if (!activeChatId) {
        try {
          const chat = await apiPost('/api/chats', {});
          renderSidebarItem(chat);
          activeChatId = String(chat.id);
          setActiveSidebarItem(activeChatId);
        } catch (e) {
          console.error('Failed to create chat', e);
          return;
        }
      }

      const thisChatId = activeChatId;
      const panel = getOrCreatePanel(thisChatId);
      appendUserMessage(text, panel);
      inputArea.value = '';
      inputArea.style.height = '';

      streamingChatId = thisChatId;
      updateSendButton();
      inputArea.disabled = true;

      const shell = createAssistantMessageShell(panel);

      try {
        const resp = await fetch(`/api/chats/${thisChatId}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        if (!resp.ok) {
          let detail = `Server error ${resp.status}`;
          try { const j = await resp.json(); if (j.detail) detail = j.detail; } catch {}
          shell.showError(detail);
          streamingChatId = null;
          updateSendButton();
          inputArea.disabled = false;
          return;
        }

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(part.slice(6)); } catch { continue; }
            handleSSEEvent(event, shell, thisChatId);
          }
        }

      } catch (e) {
        shell.showError(e.message || 'Network error');
      } finally {
        streamingChatId = null;
        updateSendButton();
        inputArea.disabled = false;
        if (activeChatId === thisChatId) inputArea.focus();
      }
    }

    function handleSSEEvent(event, shell, thisChatId) {
      switch (event.type) {
        case 'thinking_delta':
          shell.appendThinking(event.text || '');
          break;
        case 'tool_call':
          shell.movePendingToNotes();
          shell.finalizeThinking();
          shell.addToolCall(event.id, event.tool, summariseInput(event.input));
          break;
        case 'tool_result':
          shell.resolveToolCall(event.id, event.preview || '', event.images || []);
          break;
        case 'text_delta':
          shell.finalizeThinking();
          shell.appendText(event.text || '');
          break;
        case 'title':
          if (event.title) {
            if (activeChatId === String(thisChatId))
              document.title = `${event.title} — LinkedIn Bot`;
            updateSidebarTitle(thisChatId, event.title);
          }
          break;
        case 'done':
          shell.finalize();
          break;
        case 'error':
          shell.showError(event.message || 'An error occurred');
          break;
        default:
          break;
      }
    }

    // ════════════════════════════════════════════════════════════
    // INPUT EVENT WIRING
    // ════════════════════════════════════════════════════════════

    sendBtn.addEventListener('click', sendMessage);

    inputArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputArea.addEventListener('input', () => {
      inputArea.style.height = 'auto';
      inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
    });

    newChatBtn.addEventListener('click', createNewChat);

    // ════════════════════════════════════════════════════════════
    // BOOT
    // ════════════════════════════════════════════════════════════

    loadChatList();

  })();
  </script>
