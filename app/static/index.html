<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Roman's Agent</title>
  <link rel="icon" type="image/png" href="/static/orlanda-logo.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Base typography ──────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: "cv02","cv03","cv04","cv11";
    }

    /* ── Hebrew post font ─────────────────────────────────────── */
    .hebrew-text {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      direction: rtl;
      text-align: right;
      line-height: 1.85;
      letter-spacing: 0.01em;
    }
    [dir="rtl"], [lang="he"] {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
    }

    /* ── Spinner ──────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar { background: #0f172a; }
    #sidebar-list::-webkit-scrollbar { width: 4px; }
    #sidebar-list::-webkit-scrollbar-track { background: transparent; }
    #sidebar-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .chat-item {
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.06); border-left-color: #6366f1; }
    .chat-item.active { background: rgba(99,102,241,0.15); border-left-color: #818cf8; color: #fff; }
    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .chat-thumb-wrap {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: #1e293b;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .chat-thumb-placeholder { font-size: 20px; line-height: 1; }
    .chat-streaming-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #818cf8; flex-shrink: 0;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Message panel scrollbar ──────────────────────────────── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    /* ── Textarea auto-grow ───────────────────────────────────── */
    #input-area {
      field-sizing: content;
      max-height: 96px;
      overflow-y: auto;
      resize: none;
    }

    /* ── User bubble gradient ─────────────────────────────────── */
    .user-bubble {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
    }

    /* ── Post card accent bar ─────────────────────────────────── */
    .post-card-accent {
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    }

    /* ── Tool trace collapse animation ───────────────────────── */
    .trace-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .trace-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }
    .trace-wrap {
      border-left: 3px solid #e2e8f0;
    }

    /* ── Copy flash ───────────────────────────────────────────── */
    .copy-success { background-color: #16a34a !important; color: #fff !important; border-color: #16a34a !important; }

    /* ── Thinking animation ───────────────────────────────────── */
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }
    .thinking-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #a78bfa;
      margin: 0 1px;
      vertical-align: middle;
    }
    .thinking-dot:nth-child(1) { animation: dot-pulse 1.4s ease-in-out infinite; }
    .thinking-dot:nth-child(2) { animation: dot-pulse 1.4s ease-in-out 0.2s infinite; }
    .thinking-dot:nth-child(3) { animation: dot-pulse 1.4s ease-in-out 0.4s infinite; }
    .thinking-dots-active .thinking-dot { animation-play-state: running; }
    .thinking-dots-done .thinking-dot   { animation-play-state: paused; opacity: 0.3; }

    @keyframes thought-appear {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .thought-line {
      animation: thought-appear 0.3s ease forwards;
      opacity: 0;
    }

    /* ── Thinking section collapse ───────────────────────────── */
    .thinking-body {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .thinking-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    /* ── Image grid hover overlay ─────────────────────────────── */
    .img-thumb-wrap { position: relative; overflow: hidden; border-radius: 8px; }
    .img-thumb-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      font-size: 18px; color: white;
    }

    /* ── Attachment chip ──────────────────────────────────────── */
    .attach-chip {
      display: flex; align-items: center; gap: 6px;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 4px 8px 4px 4px;
      font-size: 12px; color: #475569; max-width: 160px;
    }
    .attach-chip img {
      width: 36px; height: 36px; object-fit: cover;
      border-radius: 6px; flex-shrink: 0;
    }
    .attach-chip .chip-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .attach-chip .chip-remove {
      flex-shrink: 0; color: #94a3b8; cursor: pointer; font-size: 14px; line-height: 1;
      padding: 0 2px;
    }
    .attach-chip .chip-remove:hover { color: #ef4444; }
    /* Inline attachment thumbnails in chat history */
    .msg-attachment-thumb {
      width: 80px; height: 80px; object-fit: cover;
      border-radius: 10px; border: 1px solid #cbd5e1;
    }
    .msg-attachment-file {
      display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
      width: 80px; height: 80px;
      background: #f1f5f9; border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 6px 4px; gap: 4px; flex-shrink: 0;
    }
    .msg-attachment-file .doc-icon { font-size: 28px; line-height: 1; }
    .msg-attachment-file .doc-name {
      font-size: 9px; color: #334155; text-align: center;
      width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 2px;
    }

    /* ── Mic button states ────────────────────────────────────── */
    #mic-btn.recording {
      background: #fee2e2; border-color: #fca5a5; color: #dc2626;
    }
    #mic-btn.transcribing {
      opacity: 0.6; cursor: not-allowed;
    }
    #mic-btn.transcribing svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Edit mode indicator ──────────────────────────────────── */
    #input-area.editing-mode {
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.25);
    }

    /* ── Mobile full-height fix (iOS Safari URL bar) ──────────── */
    html, body { height: 100dvh; max-height: 100dvh; }
    body { overflow: hidden; }

    /* ── Mobile sidebar drawer ────────────────────────────────── */
    @media (max-width: 767px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        width: 280px !important;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-backdrop {
        display: none;
        position: fixed; inset: 0; z-index: 199;
        background: rgba(0,0,0,0.5);
      }
      #sidebar-backdrop.open { display: block; }
      #menu-toggle { display: flex !important; }
      #main-header { display: flex; }
      /* Bigger touch targets on mobile */
      #send-btn { min-height: 44px; }
      #input-area { min-height: 44px; }
    }
    @media (min-width: 768px) {
      #menu-toggle { display: none !important; }
      #main-header { display: none; }
    }

    /* ── Sidebar tab toggle ───────────────────────────────────── */
    .sidebar-tab {
      flex: 1; padding: 6px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 500; text-align: center;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      color: #94a3b8; background: transparent; border: none;
    }
    .sidebar-tab.active { background: #1e293b; color: #fff; }

    /* ── Library item card ────────────────────────────────────── */
    .library-item {
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .library-item:hover { background: rgba(255,255,255,0.06); border-left-color: #6366f1; }
    .lib-status-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .lib-status-badge.draft { background: #1e3a5f; color: #7dd3fc; }
    .lib-status-badge.posted { background: #14532d; color: #86efac; }
    .lib-status-badge.promoted { background: #3b1f6b; color: #c4b5fd; }

    /* ── Auth modal ───────────────────────────────────────────── */
    #auth-modal {
      display: none;
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
    }
    #auth-modal.open { display: flex; }
    #auth-box {
      background: #fff; border-radius: 16px; padding: 32px;
      width: min(380px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* ── Lightbox ─────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 28px; color: #fff; cursor: pointer;
      line-height: 1; background: none; border: none;
      opacity: 0.8; transition: opacity 0.15s;
    }
    #lightbox-close:hover { opacity: 1; }
    #lightbox-dl {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 13px; color: #e2e8f0; text-decoration: underline;
      cursor: pointer; background: none; border: none;
    }
    #lightbox-dl:hover { color: #fff; }
  </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-100 text-slate-800 antialiased">

  <!-- ══════════════════════════════════════════════════════════════
       AUTH MODAL
  ══════════════════════════════════════════════════════════════ -->
  <div id="auth-modal" role="dialog" aria-modal="true">
    <div id="auth-box">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl overflow-hidden flex items-center justify-center bg-indigo-600"><img src="/static/orlanda-logo.png" alt="Orlanda" class="w-full h-full object-contain p-1" /></div>
        <div>
          <h2 class="font-semibold text-slate-800 text-base">Roman's Agent</h2>
          <p class="text-xs text-slate-400">Enter password to continue</p>
        </div>
      </div>
      <input
        id="auth-input"
        type="password"
        placeholder="Password"
        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-3"
      />
      <div id="auth-error" class="hidden text-xs text-red-500 mb-3"></div>
      <button
        id="auth-submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl px-4 py-3 transition"
      >Sign in</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       LIGHTBOX
  ══════════════════════════════════════════════════════════════ -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="Full size image" />
    <a id="lightbox-dl" href="#" download>⬇ Download</a>
  </div>

  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop"></div>

  <!-- ══════════════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="w-64 shrink-0 flex flex-col text-slate-100 h-full">

    <!-- Brand -->
    <div class="px-5 pt-5 pb-4 border-b border-white/10">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg overflow-hidden shrink-0 flex items-center justify-center bg-transparent"><img src="/static/orlanda-logo.png" alt="Orlanda" class="w-full h-full object-contain" /></div>
        <div>
          <h1 class="text-sm font-semibold tracking-tight text-white">Roman's Agent</h1>
          <p class="text-[11px] text-slate-400 mt-0">Hebrew post generator</p>
        </div>
      </div>
    </div>

    <!-- Tab toggle -->
    <div class="px-4 pt-3 pb-1 flex gap-1 bg-[#0f172a]">
      <button id="tab-chats" class="sidebar-tab active">💬 Chats</button>
      <button id="tab-library" class="sidebar-tab">📚 Library</button>
    </div>

    <!-- New chat button (chats only) -->
    <div id="new-chat-wrap" class="px-4 py-2">
      <button
        id="new-chat-btn"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-sm font-medium text-white transition"
      >
        <span class="text-lg leading-none">+</span>
        <span>New Chat</span>
      </button>
    </div>

    <!-- Chat / Library list -->
    <div id="sidebar-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-1">
      <!-- items injected by JS -->
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════════
       MAIN PANEL
  ══════════════════════════════════════════════════════════════ -->
  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">

    <!-- Mobile-only top bar with hamburger -->
    <div id="main-header" class="items-center gap-3 px-4 py-3 border-b border-slate-200 bg-white">
      <button id="menu-toggle" class="text-slate-600 hover:text-indigo-600 transition p-1" aria-label="Open menu">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="12" x2="19" y2="12"/><line x1="3" y1="18" x2="19" y2="18"/>
        </svg>
      </button>
      <span class="text-sm font-semibold text-slate-700">Roman's Agent</span>
    </div>

    <!-- Message list -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-6">

      <!-- Empty state -->
      <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center select-none">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl mb-5">✍️</div>
        <p class="text-xl font-semibold text-slate-700" dir="rtl" lang="he">בוא נכתוב פוסט חדש</p>
        <p class="text-sm text-slate-400 mt-2 max-w-xs" dir="rtl" lang="he">
          הדבק URL של כתבה או בניין — הסוכן יחקור, ימצא, ויכתוב בסגנון שלך
        </p>
      </div>

    </div>

    <!-- Attachment preview strip (above input bar) -->
    <div id="attach-strip" class="hidden px-4 pt-2 pb-1 flex flex-wrap gap-2 bg-white border-t border-slate-100"></div>

    <!-- Input bar -->
    <div class="border-t border-slate-200 px-4 py-3 flex items-end gap-3 bg-white shadow-sm">
      <input id="attach-input" type="file" class="hidden" multiple
        accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.docx,.txt,.md,image/*,application/pdf" />
      <button
        id="attach-btn"
        title="Attach file"
        class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:border-indigo-300 transition"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button
        id="mic-btn"
        title="Voice input"
        class="shrink-0 flex items-center justify-center w-10 h-10 rounded-xl border border-slate-200 bg-slate-50 text-slate-500 hover:text-indigo-600 hover:border-indigo-300 transition"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <!-- Voice recording bar (shown instead of textarea during recording) -->
      <div id="voice-bar" class="hidden flex-1 flex items-center gap-3 rounded-xl border border-indigo-300 bg-indigo-50 px-3" style="height:44px">
        <canvas id="voice-wave" height="32" style="flex:1;display:block"></canvas>
        <span id="voice-status" class="text-xs text-indigo-500 shrink-0 font-medium"></span>
      </div>
      <textarea
        id="input-area"
        rows="1"
        placeholder="הדבק URL או כתוב הוראה..."
        dir="auto"
        class="flex-1 rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
      ></textarea>
      <button
        id="send-btn"
        class="shrink-0 flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium rounded-xl px-4 py-2.5 transition disabled:opacity-40 disabled:cursor-not-allowed"
      >
        <span>Send</span>
        <span class="text-base">↩</span>
      </button>
    </div>
  </main>

  <!-- ══════════════════════════════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // ── DOM refs ────────────────────────────────────────────────
    const sidebarList  = document.getElementById('sidebar-list');
    const newChatBtn   = document.getElementById('new-chat-btn');
    const newChatWrap  = document.getElementById('new-chat-wrap');
    const messages     = document.getElementById('messages');
    const emptyState   = document.getElementById('empty-state');
    const inputArea    = document.getElementById('input-area');
    const sendBtn      = document.getElementById('send-btn');
    const sidebar      = document.getElementById('sidebar');
    const backdrop     = document.getElementById('sidebar-backdrop');
    const menuToggle   = document.getElementById('menu-toggle');
    const tabChats     = document.getElementById('tab-chats');
    const tabLibrary   = document.getElementById('tab-library');

    // ── App state ───────────────────────────────────────────────
    let activeChatId         = null;
    const chatStreams         = new Map(); // chatId → AbortController
    const interruptedChats    = new Set(); // chatIds whose stream dropped; server still finishing in background
    const messageAttachmentsMap = new Map(); // messageId → [{block, name, kind, objectUrl?}]
    let editingFromMessageId = null;
    const chatPanels         = {};
    let currentTab           = 'chats'; // 'chats' | 'library'
    let pendingLinkedInNote  = []; // [{company, url}] carried from disambiguation confirm into next shell

    // ── Tool metadata ────────────────────────────────────────────
    const TOOL_EMOJI = {
      scrape_url:             '🔍',
      search_web:             '🌐',
      retrieve_similar_posts: '📚',
      search_images:          '🖼️',
      find_linkedin_profiles: '🔗',
    };
    function toolEmoji(name) { return TOOL_EMOJI[name] || '⚙️'; }

    // ════════════════════════════════════════════════════════════
    // SMART SCROLL — only auto-scroll when near bottom
    // ════════════════════════════════════════════════════════════

    function scrollToBottom(force = false) {
      const threshold = 150;
      const nearBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight < threshold;
      if (force || nearBottom) {
        messages.scrollTop = messages.scrollHeight;
      }
    }

    // ════════════════════════════════════════════════════════════
    // CHAT PANELS — one panel per chat, kept in DOM for background streaming
    // ════════════════════════════════════════════════════════════

    function getOrCreatePanel(chatId) {
      const key = String(chatId);
      if (!chatPanels[key]) {
        const panel = document.createElement('div');
        panel.className = 'chat-panel w-full space-y-6';
        panel.style.display = 'none';
        messages.insertBefore(panel, emptyState);
        chatPanels[key] = panel;
      }
      return chatPanels[key];
    }

    function showPanel(chatId) {
      const key = String(chatId);
      Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
      const panel = chatPanels[key];
      if (panel && panel.children.length > 0) {
        panel.style.display = '';
        emptyState.style.display = 'none';
      } else {
        emptyState.style.display = '';
      }
    }

    function deletePanel(chatId) {
      const key = String(chatId);
      if (chatPanels[key]) {
        chatPanels[key].remove();
        delete chatPanels[key];
      }
    }

    function _makeChatThumb(thumbnailUrl) {
      const wrap = document.createElement('div');
      wrap.className = 'chat-thumb-wrap';
      if (thumbnailUrl) {
        const img = document.createElement('img');
        img.src = `/api/proxy-image?url=${encodeURIComponent(thumbnailUrl)}`;
        img.alt = '';
        img.onerror = () => {
          img.remove();
          const ph = document.createElement('span');
          ph.className = 'chat-thumb-placeholder';
          ph.textContent = '🏗';
          wrap.appendChild(ph);
        };
        wrap.appendChild(img);
      } else {
        const ph = document.createElement('span');
        ph.className = 'chat-thumb-placeholder';
        ph.textContent = '🏗';
        wrap.appendChild(ph);
      }
      return wrap;
    }

    function renderSidebarItem(chat, append = false) {
      const existing = document.getElementById(`chat-item-${chat.id}`);
      if (existing) {
        const titleEl = existing.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = chat.title || 'New Chat';
        // Apply thumbnail if it just became available
        if (chat.thumbnail_url) {
          const wrap = existing.querySelector('.chat-thumb-wrap');
          if (wrap && !wrap.querySelector('img')) {
            wrap.innerHTML = '';
            const img = document.createElement('img');
            img.src = `/api/proxy-image?url=${encodeURIComponent(chat.thumbnail_url)}`;
            img.alt = '';
            img.onerror = () => img.remove();
            wrap.appendChild(img);
          }
        }
        return existing;
      }

      const item = document.createElement('div');
      item.id = `chat-item-${chat.id}`;
      item.dataset.chatId = chat.id;
      item.className = 'chat-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-slate-300';

      item.appendChild(_makeChatThumb(chat.thumbnail_url));

      const title = document.createElement('span');
      title.className = 'chat-title flex-1 text-sm leading-snug line-clamp-2 text-right';
      title.setAttribute('dir', 'rtl');
      title.textContent = chat.title || 'New Chat';
      item.appendChild(title);

      const del = document.createElement('button');
      del.className = 'delete-btn shrink-0 text-slate-500 hover:text-red-400 text-xs px-1 transition';
      del.textContent = '×';
      del.title = 'Delete chat';
      del.addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteChat(chat.id);
      });
      item.appendChild(del);

      item.addEventListener('click', () => { loadChat(chat.id); closeSidebar(); });
      if (append) sidebarList.appendChild(item);
      else sidebarList.prepend(item);
      return item;
    }

    function updateSidebarThumbnail(chatId, url) {
      const item = document.getElementById(`chat-item-${chatId}`);
      if (!item) return;
      const wrap = item.querySelector('.chat-thumb-wrap');
      if (!wrap || wrap.querySelector('img')) return; // already has an image
      wrap.innerHTML = '';
      const img = document.createElement('img');
      img.src = `/api/proxy-image?url=${encodeURIComponent(url)}`;
      img.alt = '';
      img.onerror = () => img.remove();
      wrap.appendChild(img);
    }

    function setActiveSidebarItem(chatId) {
      document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', el.dataset.chatId === String(chatId));
      });
    }

    function updateSidebarTitle(chatId, title) {
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) {
        const titleEl = item.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = title;
      }

    function appendUserMessage(text, panel, messageId = null, attachments = []) {
      const target = panel || getOrCreatePanel(activeChatId);
      emptyState.style.display = 'none';
      target.style.display = '';

      const wrap = document.createElement('div');
      wrap.className = 'flex flex-col items-end gap-1';
      if (messageId) wrap.dataset.messageId = String(messageId);

      // Attachment thumbnails above the bubble
      if (attachments.length > 0) {
        const attRow = document.createElement('div');
        attRow.className = 'flex flex-wrap gap-2 justify-end';
        attachments.forEach(a => {
          const imgSrc = a.objectUrl || (a.block?.type === 'image' && a.block?.source?.data
            ? `data:${a.block.source.media_type};base64,${a.block.source.data}` : null);
          if (imgSrc) {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.alt = a.name || 'image';
            img.className = 'msg-attachment-thumb';
            attRow.appendChild(img);
          } else {
            const pill = document.createElement('div');
            pill.className = 'msg-attachment-file';
            const icon = document.createElement('span');
            icon.className = 'doc-icon';
            icon.textContent = a.kind === 'pdf' ? '📄' : a.kind === 'docx' ? '📝' : '📃';
            const label = document.createElement('span');
            label.className = 'doc-name';
            label.textContent = a.name || 'file';
            pill.appendChild(icon);
            pill.appendChild(label);
            attRow.appendChild(pill);
          }
        });
        wrap.appendChild(attRow);
      }

      if (text) {
        const bubble = document.createElement('div');
        bubble.className = 'user-bubble max-w-[80vw] md:max-w-lg text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm shadow-sm';
        bubble.style.cssText = "white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere";
        bubble.style.fontFamily = "'Heebo', sans-serif";
        bubble.textContent = text;
        wrap.appendChild(bubble);

        if (messageId) {
          const editBtn = document.createElement('button');
          editBtn.className = 'text-xs text-slate-400 hover:text-amber-500 transition';
          editBtn.style.cssText = 'opacity:0;font-size:11px';
          editBtn.textContent = '✏️ Edit & resend';
          editBtn.addEventListener('click', () => editMessage(text, messageId));
          wrap.addEventListener('mouseenter', () => { editBtn.style.opacity = '1'; });
          wrap.addEventListener('mouseleave', () => { editBtn.style.opacity = '0'; });
          wrap.appendChild(editBtn);
        }
      }

      target.appendChild(wrap);
      scrollToBottom(true);
      return wrap;
    }

    function renderBold(raw) {
      const escaped = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
    }

    // LIGHTBOX
    // ════════════════════════════════════════════════════════════

    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxDl  = document.getElementById('lightbox-dl');

    function openLightbox(proxyView, proxyDl) {
      lightboxImg.src = proxyView;
      lightboxDl.href = proxyDl;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ════════════════════════════════════════════════════════════
    // IMAGE GRID
    // ════════════════════════════════════════════════════════════

    function buildImageGrid(images) {
      const LIMIT = 4;
      const shown = images.slice(0, LIMIT);
      const extra = images.slice(LIMIT);

      const grid = document.createElement('div');
      const single = shown.length === 1;
      grid.className = single
        ? 'w-full'
        : 'w-full grid grid-cols-1 sm:grid-cols-2 gap-2';

      function makeThumb(src, eager = false) {
        const proxyView = `/api/proxy-image?url=${encodeURIComponent(src)}`;
        const proxyDl   = `/api/proxy-image?url=${encodeURIComponent(src)}&download=true`;

        const outer = document.createElement('div');
        outer.className = 'min-w-0 flex flex-col gap-1';

        const imgWrap = document.createElement('div');
        imgWrap.className = 'img-thumb-wrap cursor-pointer';

        const img = document.createElement('img');
        // Load via proxy directly — avoids hotlink protection entirely
        img.src = proxyView;
        img.loading = eager ? 'eager' : 'lazy';
        img.className = single
          ? 'w-full max-h-72 rounded-lg object-cover border border-slate-200'
          : 'w-full h-48 object-cover border border-slate-200';
        img.onerror = () => outer.remove();

        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        overlay.textContent = '⤢';

        // Click thumbnail → open lightbox
        imgWrap.addEventListener('click', () => openLightbox(proxyView, proxyDl));

        imgWrap.appendChild(img);
        imgWrap.appendChild(overlay);
        outer.appendChild(imgWrap);

        // Download link below thumbnail
        const actions = document.createElement('div');
        actions.className = 'flex gap-3 px-0.5';

        const dlLink = document.createElement('a');
        dlLink.href = proxyDl;
        dlLink.className = 'text-xs text-slate-400 hover:text-indigo-500 transition';
        dlLink.textContent = '⬇ Download';
        dlLink.addEventListener('click', e => e.stopPropagation());

        actions.appendChild(dlLink);
        outer.appendChild(actions);

        return outer;
      }

      shown.forEach(src => grid.appendChild(makeThumb(src)));

      if (extra.length > 0) {
        const moreBtn = document.createElement('button');
        moreBtn.className = 'col-span-2 text-xs text-indigo-600 hover:text-indigo-800 font-medium py-1 transition';
        moreBtn.textContent = `+${extra.length} more images`;
        moreBtn.addEventListener('click', () => {
          // eager=true so images load immediately when inserted
          extra.forEach(src => grid.insertBefore(makeThumb(src, true), moreBtn));
          moreBtn.remove();
        });
        grid.appendChild(moreBtn);
      }

      return grid;
    }

      copyBtn.textContent = 'העתק';

          await navigator.clipboard.writeText(text);

          const ta = document.createElement('textarea');
          ta.value = text;
          Object.assign(ta.style, { position:'fixed', opacity:'0' });
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);

        copyBtn.textContent = 'הועתק ✓';
        copyBtn.classList.add('copy-success');
        setTimeout(() => {
          copyBtn.textContent = 'העתק';

      disambigSection.appendChild(disambigBody);

      wrap.appendChild(traceWrap);

      wrap.appendChild(errorEl);
      target.appendChild(wrap);
      scrollToBottom();

      // ── Mutator API ───────────────────────────────────────────
      const toolRows = {};
      const shellLinkedInResolved = [...pendingLinkedInNote]; // absorb any carried-over selections
      pendingLinkedInNote = [];

      return {
        addToolCall(id, toolName, inputSummary) {
          const row = document.createElement('div');
          row.className = 'flex items-start gap-2 text-xs text-slate-600 py-0.5';

          const statusEl = document.createElement('span');
          statusEl.className = 'shrink-0 mt-0.5';

            <svg class="spinner w-3 h-3 text-indigo-400 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

          const previewEl = document.createElement('span');

          row.appendChild(statusEl);
          row.appendChild(nameEl);
          row.appendChild(inputEl);
          row.appendChild(previewEl);
          traceBody.appendChild(row);

          toolRows[id] = { row, statusEl, previewEl };
          scrollToBottom();
        },

        resolveToolCall(id, preview, images = []) {
          const entry = toolRows[id];
          if (!entry) return;
          entry.statusEl.innerHTML = '<span class="text-green-500 font-bold">✓</span>';
          if (preview) {
            entry.previewEl.textContent = preview;
            entry.previewEl.classList.remove('hidden');

          if (images && images.length > 0) {
            const grid = buildImageGrid(images);
            imagesSection.appendChild(grid);
            imagesSection.classList.remove('hidden');
            scrollToBottom();
          }
        },

        addImages(images) {
          if (!images || images.length === 0) return;
          const grid = buildImageGrid(images);
          imagesSection.appendChild(grid);
          imagesSection.classList.remove('hidden');
        },

        movePendingToNotes() {
          if (!postText.trim()) return;
          const note = document.createElement('div');
          note.className = 'text-xs text-slate-400 italic py-1 border-b border-slate-100 mb-1';
          note.textContent = postText.trim().slice(0, 300) + (postText.trim().length > 300 ? '…' : '');
          traceBody.insertBefore(note, traceBody.firstChild);
          postText = '';
          postContent.innerHTML = '';
          postCard.classList.add('hidden');
        },

        appendText(text) {
          postCard.classList.remove('hidden');
          postText += text;
          postContent.innerHTML = renderBold(postText);
          scrollToBottom();
        },

        addDisambiguation(company, candidates) {
          pendingDisambiguations.push({ company, candidates, selected: candidates[0]?.url || '' });
          disambigSection.classList.remove('hidden');

          const block = document.createElement('div');
          block.className = 'space-y-1';

          const label = document.createElement('div');
          label.className = 'text-xs font-semibold text-slate-700 mb-1';
          label.textContent = company;
          block.appendChild(label);

          const idx = pendingDisambiguations.length - 1;
          candidates.forEach((c, ci) => {
            const row = document.createElement('label');
            row.className = 'flex items-start gap-2 p-2 rounded-lg cursor-pointer hover:bg-amber-100 transition';

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `li-disambig-${idx}`;
            radio.value = c.url;
            radio.className = 'mt-0.5 shrink-0 accent-amber-600';
            if (ci === 0) radio.checked = true;
            radio.addEventListener('change', () => { pendingDisambiguations[idx].selected = c.url; });

            const info = document.createElement('div');
            info.className = 'min-w-0';

            const title = document.createElement('div');
            title.className = 'text-sm font-medium text-slate-800 leading-tight';
            title.textContent = c.title;

            const desc = document.createElement('div');
            desc.className = 'text-xs text-slate-400 leading-tight mt-0.5';
            desc.textContent = c.description || '';

            const link = document.createElement('a');
            link.href = c.url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = 'text-xs text-blue-500 hover:underline mt-0.5 inline-block';
            link.textContent = '↗ פתח בלינקדאין';

            info.appendChild(title);
            if (c.description) info.appendChild(desc);
            info.appendChild(link);
            row.appendChild(radio);
            row.appendChild(info);
            block.appendChild(row);
          });

          // "None of the above" option
          const skipRow = document.createElement('label');
          skipRow.className = 'flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-amber-100 transition';
          const skipRadio = document.createElement('input');
          skipRadio.type = 'radio';
          skipRadio.name = `li-disambig-${idx}`;
          skipRadio.value = '__skip__';
          skipRadio.className = 'shrink-0 accent-amber-600';
          skipRadio.addEventListener('change', () => { pendingDisambiguations[idx].selected = '__skip__'; });
          const skipLabel = document.createElement('span');
          skipLabel.className = 'text-sm text-slate-400 italic';
          skipLabel.textContent = 'אף אחד מאלה — אל תוסיף @mention';
          skipRow.appendChild(skipRadio);
          skipRow.appendChild(skipLabel);
          block.appendChild(skipRow);

          disambigBody.appendChild(block);
          scrollToBottom();
        },

        addLinkedInResolved(company, url) {
          shellLinkedInResolved.push({ company, url });
        },

        finalizeDisambiguations() {
          if (pendingDisambiguations.length === 0) return;
          disambigConfirmRow.classList.remove('hidden');
          disambigConfirmBtn.addEventListener('click', () => {
            const resolved = pendingDisambiguations.filter(d => d.selected !== '__skip__');
            const skipped  = pendingDisambiguations.filter(d => d.selected === '__skip__');
            pendingLinkedInNote = resolved.map(d => ({ company: d.company, url: d.selected }));
            const resolvedLines = resolved.map(d => `${d.company} → ${d.selected}`).join('\n');
            const skippedLines  = skipped.map(d => `${d.company} → skip`).join('\n');
            const allLines = [resolvedLines, skippedLines].filter(Boolean).join('\n') || 'skip all';
            const msg = `[LinkedIn @mentions confirmed]\n${allLines}\n\nעכשיו כתוב את הפוסט עם ה-@mentions שאישרתי.`;
            inputArea.value = msg;
            disambigSection.classList.add('hidden');
            sendMessage();
          });
          scrollToBottom();
        },

        showLinkedInMentionsNote(items) {
          if (!items || items.length === 0) return;
          const noteEl = document.createElement('div');
          noteEl.className = 'rounded-xl border border-blue-100 px-4 py-3 text-xs text-slate-600';
          noteEl.style.background = '#eff6ff';
          const noteTitle = document.createElement('div');
          noteTitle.className = 'font-semibold text-slate-700 mb-2';
          noteTitle.textContent = '🔗 LinkedIn mentions to add manually:';
          noteEl.appendChild(noteTitle);
          items.forEach(({ company, url }) => {
            const row = document.createElement('div');
            row.className = 'flex items-center gap-2 py-0.5 flex-wrap';
            const companyEl = document.createElement('span');
            companyEl.className = 'font-medium text-slate-800';
            companyEl.textContent = `@${company}`;
            const arrow = document.createElement('span');
            arrow.className = 'text-slate-400';
            arrow.textContent = '→';
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = 'text-blue-500 hover:underline break-all';
            link.textContent = url.replace('https://www.', '');
            row.appendChild(companyEl);
            row.appendChild(arrow);
            row.appendChild(link);
            noteEl.appendChild(row);
          });
          wrap.insertBefore(noteEl, btnRow);
        },

        finalize(messageId = null) {
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (postContent.textContent.trim()) {
            copyBtn.classList.remove('hidden');
            saveBtn.classList.remove('hidden');
          }
          this.finalizeDisambiguations();
          if (shellLinkedInResolved.length > 0) this.showLinkedInMentionsNote(shellLinkedInResolved);
          scrollToBottom(true);
        },

        showError(msg) {
          errorEl.textContent = msg;
          errorEl.classList.remove('hidden');
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-red-500 font-bold text-xs">✗</span>';
        },

        markBackground() {
          // Stream was interrupted (e.g. phone backgrounded). The server keeps
          // generating and saves the reply; show a calm note, not a red error.
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-amber-500 font-bold text-xs">⏳</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (!wrap.querySelector('.bg-continue-note')) {
            const note = document.createElement('div');
            note.className = 'bg-continue-note rounded-xl border border-amber-100 px-4 py-2.5 text-xs text-amber-700';
            note.style.background = '#fffbeb';
            note.textContent = '⏳ החיבור נותק — התשובה ממשיכה להיווצר בשרת ותופיע אוטומטית כשתחזור.';
            wrap.insertBefore(note, btnRow);
          }
          scrollToBottom(true);
        },

        appendThinking(text) {
          if (thinkingFinalized) return;
          thinkingSection.classList.remove('hidden');
          thinkingBuffer += text;

          const parts = thinkingBuffer.split('\n');
          for (let i = 0; i < parts.length - 1; i++) {
            const lineText = parts[i].trim();
            if (!lineText) continue;
            if (currentThoughtLine) currentThoughtLine = null;
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.textContent = lineText;
            thinkingBody.appendChild(line);
          }

          const partial = parts[parts.length - 1];
          if (partial) {
            if (!currentThoughtLine) {
              currentThoughtLine = document.createElement('div');
              currentThoughtLine.className = 'text-violet-400 opacity-70';
              thinkingBody.appendChild(currentThoughtLine);
            }
            currentThoughtLine.textContent = partial;
          }

          thinkingBuffer = partial;
          scrollToBottom();
        },

        finalizeThinking() {
          if (thinkingFinalized) return;
          thinkingFinalized = true;

          if (currentThoughtLine && currentThoughtLine.textContent.trim()) {
            currentThoughtLine.className = 'thought-line';
            currentThoughtLine = null;
          }

          const dotsEl = thinkingHeader.querySelector('.thinking-dots');
          if (dotsEl) {
            dotsEl.classList.remove('thinking-dots-active');
            dotsEl.classList.add('thinking-dots-done');
          }
          const statusEl = thinkingHeader.querySelector('.thinking-status');
          if (statusEl) statusEl.textContent = 'Thought for a moment';

          thinkingOpen = false;
          thinkingBody.classList.add('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
        },

        renderHistory(blocks) {
          if (!Array.isArray(blocks)) return;
          for (const block of blocks) {
            if (block.type === 'tool_use') {
              const inputSummary = Object.values(block.input || {}).join(' ').slice(0, 60);
              this.addToolCall(block.id, block.name, inputSummary);
              this.resolveToolCall(block.id, '');
            } else if (block.type === 'text' && block.text) {
              postCard.classList.remove('hidden');
              postText += block.text;
              postContent.innerHTML = renderBold(postText);
            } else if (block.type === 'thinking' && block.thinking) {
              thinkingSection.classList.remove('hidden');
              const line = document.createElement('div');
              line.className = 'text-violet-500 opacity-80';
              line.textContent = block.thinking.slice(0, 200) + (block.thinking.length > 200 ? '...' : '');
              thinkingBody.appendChild(line);
            }
          }
          if (!thinkingSection.classList.contains('hidden')) {
            const dotsEl = thinkingHeader.querySelector('.thinking-dots');
            if (dotsEl) { dotsEl.classList.remove('thinking-dots-active'); dotsEl.classList.add('thinking-dots-done'); }
            const statusEl = thinkingHeader.querySelector('.thinking-status');
            if (statusEl) statusEl.textContent = 'Thought for a moment';
            thinkingOpen = false;
            thinkingBody.classList.add('collapsed');
            thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
          }
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (postContent.textContent.trim()) copyBtn.classList.remove('hidden');
          if (Object.keys(toolRows).length === 0) traceWrap.classList.add('hidden');
          if (postContent.textContent.trim()) {
            saveBtn.classList.remove('hidden');
          }
        },
      };
    }

    // ════════════════════════════════════════════════════════════
    // API HELPERS
    // ════════════════════════════════════════════════════════════

    async function apiGet(path) {
      const r = await fetch(path);
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
      return r.json();
    }

    async function apiPost(path, body) {
      const r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
      return r.json();
    }

    async function apiPatch(path, body) {
      const r = await fetch(path, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`PATCH ${path} → ${r.status}`);
      return r.json();
    }

    async function apiDelete(path) {
      const r = await fetch(path, { method: 'DELETE' });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok && r.status !== 204) throw new Error(`DELETE ${path} → ${r.status}`);
    }

    function summariseInput(input) {
      if (!input) return '';
      if (typeof input === 'string') return input.slice(0, 60);
      const vals = Object.values(input);
      if (!vals.length) return '';
      return String(vals[0]).slice(0, 60);
    }

    // CHAT MANAGEMENT

    async function loadChatList() {
      try {
        const chats = await apiGet('/api/chats');
        sidebarList.innerHTML = '';
        const sorted = [...chats].sort((a, b) =>
          new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at)
        );
        sorted.forEach(c => renderSidebarItem(c, true));
        if (sorted.length > 0) {
          loadChat(sorted[0].id);
        } else {
          emptyState.style.display = '';
        }
      } catch (e) {
        console.error('Failed to load chat list', e);
        emptyState.style.display = '';
      }
    }

    // When a stream was interrupted, the server keeps generating and saving the
    // reply. Poll for the finished assistant message and rebuild the panel so the
    // user sees the completed result without manually reloading.
    async function recoverInterruptedChat(chatId) {
      const key = String(chatId);
      if (!interruptedChats.has(key)) return;
      for (let attempt = 0; attempt < 15; attempt++) {
        if (chatStreams.has(key)) return; // a fresh stream took over — don't interfere
        let chat;
        try { chat = await apiGet(`/api/chats/${chatId}`); } catch { return; }
        const msgs = chat.messages || [];
        const last = msgs[msgs.length - 1];
        const complete = last && last.role === 'assistant' && Array.isArray(last.content)
          && last.content.some(b => b.type === 'text' && b.text && b.text.trim());
        if (complete) {
          interruptedChats.delete(key);
          if (activeChatId === key && !chatStreams.has(key)) {
            deletePanel(key);
            await loadChat(chatId);
          }
          return;
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    // iOS Safari kills in-flight fetches when backgrounded; recover when the user returns.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && activeChatId && interruptedChats.has(activeChatId)) {
        recoverInterruptedChat(activeChatId);
      }
    });

    async function loadChat(chatId) {
      const key = String(chatId);
      activeChatId = key;
      setActiveSidebarItem(key);
      updateSendStopButton();
      inputArea.disabled = chatStreams.has(key);

      // Cancel any active edit mode when switching chats
      editingFromMessageId = null;
      inputArea.classList.remove('editing-mode');

      // If we have a cached panel (e.g. streaming in background), just show it
      if (chatPanels[key]) {
        showPanel(key);
        document.title = "Roman's Agent";
        requestAnimationFrame(() => scrollToBottom(true));
        if (interruptedChats.has(key)) recoverInterruptedChat(key);
        return;
      }

      try {
        const chat = await apiGet(`/api/chats/${chatId}`);
        document.title = chat.title ? `${chat.title} — Roman's Agent` : "Roman's Agent";

        if (!chat.messages || chat.messages.length === 0) {
          showPanel(key); // shows empty state since no panel exists yet
          inputArea.focus();
          return;
        }

        const panel = getOrCreatePanel(key);

        let lastShell = null;
        let toolNameById_hist = {};
        let pendingLinkedInNote_hist = [];
        for (const msg of chat.messages) {
          if (msg.role === 'user') {
            const content = msg.content;
            if (Array.isArray(content)) {
              const text = content.filter(b => b.type === 'text' && !b.text?.startsWith('[File:')).map(b => b.text).join('\n');
              const historyAttachments = content
                .filter(b => b.type === 'image' || b.type === 'document' || (b.type === 'text' && b.text?.startsWith('[File:')))
                .map(b => {
                  if (b.type === 'image') return { block: b, name: b.source?.media_type?.replace('image/', '') || 'image', kind: 'image' };
                  if (b.type === 'document') return { block: b, name: 'document.pdf', kind: 'pdf' };
                  // text block with [File: name]
                  const match = b.text?.match(/^\[File: (.+?)\]/);
                  const fname = match ? match[1] : 'file';
                  const ext = fname.split('.').pop().toLowerCase();
                  return { block: b, name: fname, kind: ext === 'docx' ? 'docx' : 'text' };
                });
              appendUserMessage(text, panel, msg.id, historyAttachments);
              if (historyAttachments.length > 0) messageAttachmentsMap.set(String(msg.id), historyAttachments);
              if (lastShell) {
                content.forEach(b => {
                  if (b.type === 'tool_result' && Array.isArray(b.__images__) && b.__images__.length > 0) {
                    lastShell.addImages(b.__images__);
                  }
                  // Collect auto-resolved LinkedIn profiles (count=1)
                  if (b.type === 'tool_result' && toolNameById_hist[b.tool_use_id] === 'find_linkedin_profiles') {
                    try {
                      const raw = typeof b.content === 'string' ? b.content : JSON.stringify(b.content);
                      const r = JSON.parse(raw);
                      if (r.count === 1 && r.candidates?.[0]) {
                        pendingLinkedInNote_hist.push({ company: r.candidates[0].title, url: r.candidates[0].url });
                      }
                    } catch (e) {}
                  }
                });
              }
              // Collect user-confirmed LinkedIn selections from disambiguation turn
              if (text.startsWith('[LinkedIn @mentions confirmed]')) {
                text.split('\n').slice(1).forEach(line => {
                  const m = line.match(/^@(.+?)\s*→\s*(https?:\/\/.+)$/);
                  if (m) pendingLinkedInNote_hist.push({ company: m[1].trim(), url: m[2].trim() });
                });
              }
            } else {
              appendUserMessage(content || msg.text || '', panel, msg.id);
            }
          } else if (msg.role === 'assistant') {
            // Build tool name lookup from this assistant's tool_use blocks
            toolNameById_hist = {};
            const content = msg.content;
            if (Array.isArray(content)) {
              content.forEach(b => { if (b.type === 'tool_use' && b.id) toolNameById_hist[b.id] = b.name; });
            }
            lastShell = createAssistantMessageShell(panel);
            if (Array.isArray(content)) {
              lastShell.renderHistory(content);
            } else if (typeof content === 'string') {
              lastShell.renderHistory([{ type: 'text', text: content }]);
            }
            if (pendingLinkedInNote_hist.length > 0) {
              lastShell.showLinkedInMentionsNote(pendingLinkedInNote_hist);
              pendingLinkedInNote_hist = [];
            }
          }
        }

        showPanel(key);
        requestAnimationFrame(() => scrollToBottom(true));
        inputArea.focus();
      } catch (e) {
        console.error('Failed to load chat', e);
        emptyState.style.display = '';
      }
    }

    async function createNewChat() {
      try {
        const chat = await apiPost('/api/chats', {});
        renderSidebarItem(chat);
        activeChatId = String(chat.id);
        setActiveSidebarItem(activeChatId);
        updateSendStopButton();
        inputArea.disabled = false;
        // Show empty state for the new chat
        Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
        emptyState.style.display = '';

      } catch (e) {

      }
    }

    async function deleteChat(chatId) {
      try {
        await apiDelete(`/api/chats/${chatId}`);
      } catch (e) {
        console.error('Failed to delete chat', e);
      }
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) item.remove();

          loadChat(firstItem.dataset.chatId);
