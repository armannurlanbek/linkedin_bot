<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Roman's Agent</title>
  <link rel="icon" type="image/png" href="/static/orlanda-logo.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Base typography ──────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: "cv02","cv03","cv04","cv11";
    }

    /* ── Hebrew post font ─────────────────────────────────────── */
    .hebrew-text {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      direction: rtl;
      text-align: right;
      line-height: 1.85;
      letter-spacing: 0.01em;
    }
    [dir="rtl"], [lang="he"] {
      font-family: 'Heebo', "Arial Hebrew", Arial, sans-serif;
    }

    /* ── Spinner ──────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar { background: #0f172a; }
    #sidebar-list::-webkit-scrollbar { width: 4px; }
    #sidebar-list::-webkit-scrollbar-track { background: transparent; }
    #sidebar-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .chat-item {
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.06); border-left-color: #6366f1; }
    .chat-item.active { background: rgba(99,102,241,0.15); border-left-color: #818cf8; color: #fff; }
    .chat-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .chat-thumb-wrap {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: #1e293b;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .chat-thumb-placeholder { font-size: 20px; line-height: 1; }
    .chat-streaming-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #818cf8; flex-shrink: 0;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Message panel scrollbar ──────────────────────────────── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    /* ── Textarea auto-grow ───────────────────────────────────── */
    #input-area {
      field-sizing: content;
      max-height: 96px;
      overflow-y: auto;
      resize: none;
    }

    /* ── User bubble gradient ─────────────────────────────────── */
    .user-bubble {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
    }

    /* ── Post card accent bar ─────────────────────────────────── */
    .post-card-accent {
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    }

    /* ── Tool trace collapse animation ───────────────────────── */
    .trace-body {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .trace-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }
    .trace-wrap {
      border-left: 3px solid #e2e8f0;
    }

    /* ── Copy flash ───────────────────────────────────────────── */
    .copy-success { background-color: #16a34a !important; color: #fff !important; border-color: #16a34a !important; }

    /* ── Thinking animation ───────────────────────────────────── */
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }
    .thinking-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #a78bfa;
      margin: 0 1px;
      vertical-align: middle;
    }
    .thinking-dot:nth-child(1) { animation: dot-pulse 1.4s ease-in-out infinite; }
    .thinking-dot:nth-child(2) { animation: dot-pulse 1.4s ease-in-out 0.2s infinite; }
    .thinking-dot:nth-child(3) { animation: dot-pulse 1.4s ease-in-out 0.4s infinite; }
    .thinking-dots-active .thinking-dot { animation-play-state: running; }
    .thinking-dots-done .thinking-dot   { animation-play-state: paused; opacity: 0.3; }

    @keyframes thought-appear {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .thought-line {
      animation: thought-appear 0.3s ease forwards;
      opacity: 0;
    }

    /* ── Thinking section collapse ───────────────────────────── */
    .thinking-body {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .thinking-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    /* ── Image grid hover overlay ─────────────────────────────── */
    .img-thumb-wrap { position: relative; overflow: hidden; border-radius: 8px; }
    .img-thumb-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      font-size: 18px; color: white;
    }

    /* ── Edit mode indicator ──────────────────────────────────── */
    #input-area.editing-mode {
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.25);
    }

    /* ── Mobile full-height fix (iOS Safari URL bar) ──────────── */
    html, body { height: 100dvh; max-height: 100dvh; }
    body { overflow: hidden; }

    /* ── Mobile sidebar drawer ────────────────────────────────── */
    @media (max-width: 767px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        width: 280px !important;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-backdrop {
        display: none;
        position: fixed; inset: 0; z-index: 199;
        background: rgba(0,0,0,0.5);
      }
      #sidebar-backdrop.open { display: block; }
      #menu-toggle { display: flex !important; }
      #main-header { display: flex; }
      /* Bigger touch targets on mobile */
      #send-btn { min-height: 44px; }
      #input-area { min-height: 44px; }
    }
    @media (min-width: 768px) {
      #menu-toggle { display: none !important; }
      #main-header { display: none; }
    }

    /* ── Sidebar tab toggle ───────────────────────────────────── */
    .sidebar-tab {
      flex: 1; padding: 6px 10px; border-radius: 8px;
      font-size: 12px; font-weight: 500; text-align: center;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      color: #94a3b8; background: transparent; border: none;
    }
    .sidebar-tab.active { background: #1e293b; color: #fff; }

    /* ── Library item card ────────────────────────────────────── */
    .library-item {
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .library-item:hover { background: rgba(255,255,255,0.06); border-left-color: #6366f1; }
    .lib-status-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .lib-status-badge.draft { background: #1e3a5f; color: #7dd3fc; }
    .lib-status-badge.posted { background: #14532d; color: #86efac; }
    .lib-status-badge.promoted { background: #3b1f6b; color: #c4b5fd; }

    /* ── Auth modal ───────────────────────────────────────────── */
    #auth-modal {
      display: none;
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
    }
    #auth-modal.open { display: flex; }
    #auth-box {
      background: #fff; border-radius: 16px; padding: 32px;
      width: min(380px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* ── Lightbox ─────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 28px; color: #fff; cursor: pointer;
      line-height: 1; background: none; border: none;
      opacity: 0.8; transition: opacity 0.15s;
    }
    #lightbox-close:hover { opacity: 1; }
    #lightbox-dl {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 13px; color: #e2e8f0; text-decoration: underline;
      cursor: pointer; background: none; border: none;
    }
    #lightbox-dl:hover { color: #fff; }
  </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-100 text-slate-800 antialiased">

  <!-- ══════════════════════════════════════════════════════════════
       AUTH MODAL
  ══════════════════════════════════════════════════════════════ -->
  <div id="auth-modal" role="dialog" aria-modal="true">
    <div id="auth-box">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl overflow-hidden flex items-center justify-center bg-indigo-600"><img src="/static/orlanda-logo.png" alt="Orlanda" class="w-full h-full object-contain p-1" /></div>
        <div>
          <h2 class="font-semibold text-slate-800 text-base">Roman's Agent</h2>
          <p class="text-xs text-slate-400">Enter password to continue</p>
        </div>
      </div>
      <input
        id="auth-input"
        type="password"
        placeholder="Password"
        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-3"
      />
      <div id="auth-error" class="hidden text-xs text-red-500 mb-3"></div>
      <button
        id="auth-submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl px-4 py-3 transition"
      >Sign in</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════
       LIGHTBOX
  ══════════════════════════════════════════════════════════════ -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="Full size image" />
    <a id="lightbox-dl" href="#" download>⬇ Download</a>
  </div>

  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop"></div>

  <!-- ══════════════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════════ -->
  <aside id="sidebar" class="w-64 shrink-0 flex flex-col text-slate-100 h-full">

    <!-- Brand -->
    <div class="px-5 pt-5 pb-4 border-b border-white/10">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg overflow-hidden shrink-0 flex items-center justify-center bg-transparent"><img src="/static/orlanda-logo.png" alt="Orlanda" class="w-full h-full object-contain" /></div>
        <div>
          <h1 class="text-sm font-semibold tracking-tight text-white">Roman's Agent</h1>
          <p class="text-[11px] text-slate-400 mt-0">Hebrew post generator</p>
        </div>
      </div>
    </div>

    <!-- Tab toggle -->
    <div class="px-4 pt-3 pb-1 flex gap-1 bg-[#0f172a]">
      <button id="tab-chats" class="sidebar-tab active">💬 Chats</button>
      <button id="tab-library" class="sidebar-tab">📚 Library</button>
    </div>

    <!-- New chat button (chats only) -->
    <div id="new-chat-wrap" class="px-4 py-2">
      <button
        id="new-chat-btn"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-sm font-medium text-white transition"
      >
        <span class="text-lg leading-none">+</span>
        <span>New Chat</span>
      </button>
    </div>

    <!-- Chat / Library list -->
    <div id="sidebar-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-1">
      <!-- items injected by JS -->
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════════
       MAIN PANEL
  ══════════════════════════════════════════════════════════════ -->
  <main class="flex-1 flex flex-col min-w-0 bg-slate-50">

    <!-- Mobile-only top bar with hamburger -->
    <div id="main-header" class="items-center gap-3 px-4 py-3 border-b border-slate-200 bg-white">
      <button id="menu-toggle" class="text-slate-600 hover:text-indigo-600 transition p-1" aria-label="Open menu">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="12" x2="19" y2="12"/><line x1="3" y1="18" x2="19" y2="18"/>
        </svg>
      </button>
      <span class="text-sm font-semibold text-slate-700">Roman's Agent</span>
    </div>

    <!-- Message list -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-6">

      <!-- Empty state -->
      <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center select-none">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl mb-5">✍️</div>
        <p class="text-xl font-semibold text-slate-700" dir="rtl" lang="he">בוא נכתוב פוסט חדש</p>
        <p class="text-sm text-slate-400 mt-2 max-w-xs" dir="rtl" lang="he">
          הדבק URL של כתבה או בניין — הסוכן יחקור, ימצא, ויכתוב בסגנון שלך
        </p>
      </div>

    </div>

    <!-- Input bar -->
    <div class="border-t border-slate-200 px-4 py-3 flex items-end gap-3 bg-white shadow-sm">
      <textarea
        id="input-area"
        rows="1"
        placeholder="הדבק URL או כתוב הוראה..."
        dir="auto"
        class="flex-1 rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
      ></textarea>
      <button
        id="send-btn"
        class="shrink-0 flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium rounded-xl px-4 py-2.5 transition disabled:opacity-40 disabled:cursor-not-allowed"
      >
        <span>Send</span>
        <span class="text-base">↩</span>
      </button>
    </div>
  </main>

  <!-- ══════════════════════════════════════════════════════════════
       JAVASCRIPT
  ══════════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // ── DOM refs ────────────────────────────────────────────────
    const sidebarList  = document.getElementById('sidebar-list');
    const newChatBtn   = document.getElementById('new-chat-btn');
    const newChatWrap  = document.getElementById('new-chat-wrap');
    const messages     = document.getElementById('messages');
    const emptyState   = document.getElementById('empty-state');
    const inputArea    = document.getElementById('input-area');
    const sendBtn      = document.getElementById('send-btn');
    const sidebar      = document.getElementById('sidebar');
    const backdrop     = document.getElementById('sidebar-backdrop');
    const menuToggle   = document.getElementById('menu-toggle');
    const tabChats     = document.getElementById('tab-chats');
    const tabLibrary   = document.getElementById('tab-library');

    // ── App state ───────────────────────────────────────────────
    let activeChatId         = null;
    const chatStreams         = new Map(); // chatId → AbortController
    let editingFromMessageId = null;
    const chatPanels         = {};
    let currentTab           = 'chats'; // 'chats' | 'library'

    // ── Tool metadata ────────────────────────────────────────────
    const TOOL_EMOJI = {
      scrape_url:             '🔍',
      search_web:             '🌐',
      retrieve_similar_posts: '📚',
      search_images:          '🖼️',
    };
    function toolEmoji(name) { return TOOL_EMOJI[name] || '⚙️'; }

    // ════════════════════════════════════════════════════════════
    // SMART SCROLL — only auto-scroll when near bottom
    // ════════════════════════════════════════════════════════════

    function scrollToBottom(force = false) {
      const threshold = 150;
      const nearBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight < threshold;
      if (force || nearBottom) {
        messages.scrollTop = messages.scrollHeight;
      }
    }

    // ════════════════════════════════════════════════════════════
    // CHAT PANELS — one panel per chat, kept in DOM for background streaming
    // ════════════════════════════════════════════════════════════

    function getOrCreatePanel(chatId) {
      const key = String(chatId);
      if (!chatPanels[key]) {
        const panel = document.createElement('div');
        panel.className = 'chat-panel w-full space-y-6';
        panel.style.display = 'none';
        messages.insertBefore(panel, emptyState);
        chatPanels[key] = panel;
      }
      return chatPanels[key];
    }

    function showPanel(chatId) {
      const key = String(chatId);
      Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
      const panel = chatPanels[key];
      if (panel && panel.children.length > 0) {
        panel.style.display = '';
        emptyState.style.display = 'none';
      } else {
        emptyState.style.display = '';
      }
    }

    function deletePanel(chatId) {
      const key = String(chatId);
      if (chatPanels[key]) {
        chatPanels[key].remove();
        delete chatPanels[key];
      }
    }

    // ════════════════════════════════════════════════════════════
    // SIDEBAR
    // ════════════════════════════════════════════════════════════

    function _makeChatThumb(thumbnailUrl) {
      const wrap = document.createElement('div');
      wrap.className = 'chat-thumb-wrap';
      if (thumbnailUrl) {
        const img = document.createElement('img');
        img.src = `/api/proxy-image?url=${encodeURIComponent(thumbnailUrl)}`;
        img.alt = '';
        img.onerror = () => {
          img.remove();
          const ph = document.createElement('span');
          ph.className = 'chat-thumb-placeholder';
          ph.textContent = '🏗';
          wrap.appendChild(ph);
        };
        wrap.appendChild(img);
      } else {
        const ph = document.createElement('span');
        ph.className = 'chat-thumb-placeholder';
        ph.textContent = '🏗';
        wrap.appendChild(ph);
      }
      return wrap;
    }

    function renderSidebarItem(chat) {
      const existing = document.getElementById(`chat-item-${chat.id}`);
      if (existing) {
        const titleEl = existing.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = chat.title || 'New Chat';
        // Apply thumbnail if it just became available
        if (chat.thumbnail_url) {
          const wrap = existing.querySelector('.chat-thumb-wrap');
          if (wrap && !wrap.querySelector('img')) {
            wrap.innerHTML = '';
            const img = document.createElement('img');
            img.src = `/api/proxy-image?url=${encodeURIComponent(chat.thumbnail_url)}`;
            img.alt = '';
            img.onerror = () => img.remove();
            wrap.appendChild(img);
          }
        }
        return existing;
      }

      const item = document.createElement('div');
      item.id = `chat-item-${chat.id}`;
      item.dataset.chatId = chat.id;
      item.className = 'chat-item flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer text-slate-300';

      item.appendChild(_makeChatThumb(chat.thumbnail_url));

      const title = document.createElement('span');
      title.className = 'chat-title flex-1 text-sm leading-snug line-clamp-2 text-right';
      title.setAttribute('dir', 'rtl');
      title.textContent = chat.title || 'New Chat';
      item.appendChild(title);

      const del = document.createElement('button');
      del.className = 'delete-btn shrink-0 text-slate-500 hover:text-red-400 text-xs px-1 transition';
      del.textContent = '×';
      del.title = 'Delete chat';
      del.addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteChat(chat.id);
      });
      item.appendChild(del);

      item.addEventListener('click', () => { loadChat(chat.id); closeSidebar(); });
      sidebarList.prepend(item);
      return item;
    }

    function updateSidebarThumbnail(chatId, url) {
      const item = document.getElementById(`chat-item-${chatId}`);
      if (!item) return;
      const wrap = item.querySelector('.chat-thumb-wrap');
      if (!wrap || wrap.querySelector('img')) return; // already has an image
      wrap.innerHTML = '';
      const img = document.createElement('img');
      img.src = `/api/proxy-image?url=${encodeURIComponent(url)}`;
      img.alt = '';
      img.onerror = () => img.remove();
      wrap.appendChild(img);
    }

    function setActiveSidebarItem(chatId) {
      document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', el.dataset.chatId === String(chatId));
      });
    }

    function updateSidebarTitle(chatId, title) {
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) {
        const titleEl = item.querySelector('.chat-title');
        if (titleEl) titleEl.textContent = title;
      }
    }

    // ════════════════════════════════════════════════════════════
    // RENDERING HELPERS
    // ════════════════════════════════════════════════════════════

    function appendUserMessage(text, panel, messageId = null) {
      const target = panel || getOrCreatePanel(activeChatId);
      emptyState.style.display = 'none';
      target.style.display = '';

      const wrap = document.createElement('div');
      wrap.className = 'flex flex-col items-end gap-1';
      if (messageId) wrap.dataset.messageId = String(messageId);

      const bubble = document.createElement('div');
      bubble.className = 'user-bubble max-w-[80vw] md:max-w-lg text-white text-sm px-4 py-2.5 rounded-2xl rounded-br-sm shadow-sm';
      bubble.style.cssText = "white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere";
      bubble.style.fontFamily = "'Heebo', sans-serif";
      bubble.textContent = text;

      wrap.appendChild(bubble);

      if (messageId) {
        const editBtn = document.createElement('button');
        editBtn.className = 'text-xs text-slate-400 hover:text-amber-500 transition';
        editBtn.style.cssText = 'opacity:0;font-size:11px';
        editBtn.textContent = '✏️ Edit & resend';
        editBtn.addEventListener('click', () => editMessage(text, messageId));
        wrap.addEventListener('mouseenter', () => { editBtn.style.opacity = '1'; });
        wrap.addEventListener('mouseleave', () => { editBtn.style.opacity = '0'; });
        wrap.appendChild(editBtn);
      }

      target.appendChild(wrap);
      scrollToBottom(true);
      return wrap;
    }

    function renderBold(raw) {
      const escaped = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped.replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
    }

    // ════════════════════════════════════════════════════════════
    // LIGHTBOX
    // ════════════════════════════════════════════════════════════

    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxDl  = document.getElementById('lightbox-dl');

    function openLightbox(proxyView, proxyDl) {
      lightboxImg.src = proxyView;
      lightboxDl.href = proxyDl;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ════════════════════════════════════════════════════════════
    // IMAGE GRID
    // ════════════════════════════════════════════════════════════

    function buildImageGrid(images) {
      const LIMIT = 4;
      const shown = images.slice(0, LIMIT);
      const extra = images.slice(LIMIT);

      const grid = document.createElement('div');
      const single = shown.length === 1;
      grid.className = single
        ? 'w-full'
        : 'w-full grid grid-cols-1 sm:grid-cols-2 gap-2';

      function makeThumb(src, eager = false) {
        const proxyView = `/api/proxy-image?url=${encodeURIComponent(src)}`;
        const proxyDl   = `/api/proxy-image?url=${encodeURIComponent(src)}&download=true`;

        const outer = document.createElement('div');
        outer.className = 'min-w-0 flex flex-col gap-1';

        const imgWrap = document.createElement('div');
        imgWrap.className = 'img-thumb-wrap cursor-pointer';

        const img = document.createElement('img');
        // Load via proxy directly — avoids hotlink protection entirely
        img.src = proxyView;
        img.loading = eager ? 'eager' : 'lazy';
        img.className = single
          ? 'w-full max-h-72 rounded-lg object-cover border border-slate-200'
          : 'w-full h-48 object-cover border border-slate-200';
        img.onerror = () => outer.remove();

        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        overlay.textContent = '⤢';

        // Click thumbnail → open lightbox
        imgWrap.addEventListener('click', () => openLightbox(proxyView, proxyDl));

        imgWrap.appendChild(img);
        imgWrap.appendChild(overlay);
        outer.appendChild(imgWrap);

        // Download link below thumbnail
        const actions = document.createElement('div');
        actions.className = 'flex gap-3 px-0.5';

        const dlLink = document.createElement('a');
        dlLink.href = proxyDl;
        dlLink.className = 'text-xs text-slate-400 hover:text-indigo-500 transition';
        dlLink.textContent = '⬇ Download';
        dlLink.addEventListener('click', e => e.stopPropagation());

        actions.appendChild(dlLink);
        outer.appendChild(actions);

        return outer;
      }

      shown.forEach(src => grid.appendChild(makeThumb(src)));

      if (extra.length > 0) {
        const moreBtn = document.createElement('button');
        moreBtn.className = 'col-span-2 text-xs text-indigo-600 hover:text-indigo-800 font-medium py-1 transition';
        moreBtn.textContent = `+${extra.length} more images`;
        moreBtn.addEventListener('click', () => {
          // eager=true so images load immediately when inserted
          extra.forEach(src => grid.insertBefore(makeThumb(src, true), moreBtn));
          moreBtn.remove();
        });
        grid.appendChild(moreBtn);
      }

      return grid;
    }

    // ════════════════════════════════════════════════════════════
    // ASSISTANT MESSAGE SHELL
    // ════════════════════════════════════════════════════════════

    function createAssistantMessageShell(panel) {
      const target = panel || getOrCreatePanel(activeChatId);
      emptyState.style.display = 'none';
      target.style.display = '';

      const wrap = document.createElement('div');
      wrap.className = 'flex flex-col gap-3 max-w-3xl w-full min-w-0';

      // ── Thinking section ──────────────────────────────────────
      const thinkingSection = document.createElement('div');
      thinkingSection.className = 'rounded-xl border border-violet-200 overflow-hidden hidden';
      thinkingSection.style.background = '#faf5ff';

      const thinkingHeader = document.createElement('button');
      thinkingHeader.className = 'w-full flex items-center justify-between px-4 py-2.5 hover:bg-violet-100 transition text-xs font-medium text-violet-600 text-left';
      thinkingHeader.style.background = '#f5f3ff';
      thinkingHeader.innerHTML = `
        <span class="thinking-label flex items-center gap-2">
          <span>💭</span>
          <span class="thinking-status">Thinking</span>
          <span class="thinking-dots thinking-dots-active">
            <span class="thinking-dot"></span>
            <span class="thinking-dot"></span>
            <span class="thinking-dot"></span>
          </span>
        </span>
        <span class="thinking-chevron text-violet-400 transition-transform duration-200">▲</span>
      `;

      const thinkingBody = document.createElement('div');
      thinkingBody.className = 'thinking-body px-4 py-3 space-y-1 font-mono text-xs text-violet-700 leading-relaxed';
      thinkingBody.style.cssText = 'max-height:280px;opacity:1;background:#faf5ff';

      let thinkingOpen = true;
      thinkingHeader.addEventListener('click', () => {
        thinkingOpen = !thinkingOpen;
        if (thinkingOpen) {
          thinkingBody.style.maxHeight = '280px';
          thinkingBody.style.opacity = '1';
          thinkingBody.classList.remove('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = '';
        } else {
          thinkingBody.classList.add('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
        }
      });

      thinkingSection.appendChild(thinkingHeader);
      thinkingSection.appendChild(thinkingBody);

      let postText = '';
      let thinkingBuffer = '';
      let thinkingFinalized = false;
      let currentThoughtLine = null;

      // ── Tool trace ────────────────────────────────────────────
      const traceWrap = document.createElement('div');
      traceWrap.className = 'trace-wrap rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm';

      const traceHeader = document.createElement('button');
      traceHeader.className = 'w-full flex items-center justify-between px-4 py-2 bg-slate-50 hover:bg-slate-100 transition text-xs font-medium text-slate-500 text-left';
      traceHeader.innerHTML = `
        <span class="flex items-center gap-1.5">
          <span class="trace-status-icon inline-block w-3 h-3">
            <svg class="spinner w-3 h-3 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
          </span>
          <span class="text-slate-600 font-medium">Tool trace</span>
        </span>
        <span class="trace-chevron text-slate-400 transition-transform duration-200">▲</span>
      `;

      const traceBody = document.createElement('div');
      traceBody.className = 'trace-body px-4 py-2.5 space-y-1.5 bg-white';
      traceBody.style.cssText = 'max-height:500px;opacity:1';

      let traceOpen = true;
      traceHeader.addEventListener('click', () => {
        traceOpen = !traceOpen;
        if (traceOpen) {
          traceBody.style.maxHeight = '500px';
          traceBody.style.opacity = '1';
          traceBody.classList.remove('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = '';
        } else {
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
        }
      });

      traceWrap.appendChild(traceHeader);
      traceWrap.appendChild(traceBody);

      // ── Images section (outside trace, no overflow clipping) ──
      const imagesSection = document.createElement('div');
      imagesSection.className = 'w-full overflow-hidden hidden';

      // ── Post card ─────────────────────────────────────────────
      const postCard = document.createElement('div');
      postCard.className = 'bg-white rounded-xl border border-slate-200 shadow-md overflow-hidden hidden w-full min-w-0';

      const postAccent = document.createElement('div');
      postAccent.className = 'post-card-accent';
      postCard.appendChild(postAccent);

      const postContent = document.createElement('div');
      postContent.className = 'hebrew-text px-5 py-4 text-[15px] text-slate-800 min-h-[80px]';
      postContent.setAttribute('lang', 'he');
      postContent.setAttribute('dir', 'rtl');
      postCard.appendChild(postContent);

      // ── Copy button ───────────────────────────────────────────
      const copyBtn = document.createElement('button');
      copyBtn.className = 'hidden self-end text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-500 border border-indigo-600 rounded-lg px-3 py-1.5 transition shadow-sm';
      copyBtn.textContent = 'העתק';
      copyBtn.addEventListener('click', async () => {
        const text = postContent.textContent;
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          Object.assign(ta.style, { position:'fixed', opacity:'0' });
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        copyBtn.textContent = 'הועתק ✓';
        copyBtn.classList.add('copy-success');
        setTimeout(() => {
          copyBtn.textContent = 'העתק';
          copyBtn.classList.remove('copy-success');
        }, 2000);
      });

      // ── Save button ───────────────────────────────────────────
      const saveBtn = document.createElement('button');
      saveBtn.className = 'hidden self-end text-xs font-medium text-slate-600 bg-white hover:bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 transition shadow-sm';
      saveBtn.textContent = '💾 שמור';
      let savedMessageId = null;
      saveBtn.addEventListener('click', async () => {
        const text = postContent.textContent;
        if (!text) return;
        saveBtn.disabled = true;
        saveBtn.textContent = '…';
        const result = await saveToLibrary(text, activeChatId, savedMessageId);
        if (result) {
          saveBtn.textContent = result.already_saved ? '✓ נשמר' : '✓ נשמר';
          saveBtn.classList.add('text-green-600', 'border-green-300');
        } else {
          saveBtn.textContent = '💾 שמור';
          saveBtn.disabled = false;
        }
      });

      // ── Error display ─────────────────────────────────────────
      const errorEl = document.createElement('div');
      errorEl.className = 'hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700';

      const btnRow = document.createElement('div');
      btnRow.className = 'flex items-center justify-end gap-2';
      btnRow.appendChild(saveBtn);
      btnRow.appendChild(copyBtn);

      wrap.appendChild(thinkingSection);
      wrap.appendChild(traceWrap);
      wrap.appendChild(imagesSection);
      wrap.appendChild(postCard);
      wrap.appendChild(btnRow);
      wrap.appendChild(errorEl);
      target.appendChild(wrap);
      scrollToBottom();

      // ── Mutator API ───────────────────────────────────────────
      const toolRows = {};

      return {
        addToolCall(id, toolName, inputSummary) {
          const row = document.createElement('div');
          row.className = 'flex items-start gap-2 text-xs text-slate-600 py-0.5';

          const statusEl = document.createElement('span');
          statusEl.className = 'shrink-0 mt-0.5';
          statusEl.innerHTML = `
            <svg class="spinner w-3 h-3 text-indigo-400 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>`;

          const nameEl = document.createElement('span');
          nameEl.className = 'font-semibold text-slate-700 shrink-0';
          nameEl.textContent = `${toolEmoji(toolName)} ${toolName}`;

          const inputEl = document.createElement('span');
          inputEl.className = 'text-slate-400 truncate min-w-0';
          inputEl.textContent = inputSummary;

          const previewEl = document.createElement('span');
          previewEl.className = 'ml-auto shrink-0 text-slate-400 italic hidden';

          row.appendChild(statusEl);
          row.appendChild(nameEl);
          row.appendChild(inputEl);
          row.appendChild(previewEl);
          traceBody.appendChild(row);

          toolRows[id] = { row, statusEl, previewEl };
          scrollToBottom();
        },

        resolveToolCall(id, preview, images = []) {
          const entry = toolRows[id];
          if (!entry) return;
          entry.statusEl.innerHTML = '<span class="text-green-500 font-bold">✓</span>';
          if (preview) {
            entry.previewEl.textContent = preview;
            entry.previewEl.classList.remove('hidden');
          }
          if (images && images.length > 0) {
            const grid = buildImageGrid(images);
            imagesSection.appendChild(grid);
            imagesSection.classList.remove('hidden');
            scrollToBottom();
          }
        },

        addImages(images) {
          if (!images || images.length === 0) return;
          const grid = buildImageGrid(images);
          imagesSection.appendChild(grid);
          imagesSection.classList.remove('hidden');
        },

        movePendingToNotes() {
          if (!postText.trim()) return;
          const note = document.createElement('div');
          note.className = 'text-xs text-slate-400 italic py-1 border-b border-slate-100 mb-1';
          note.textContent = postText.trim().slice(0, 300) + (postText.trim().length > 300 ? '…' : '');
          traceBody.insertBefore(note, traceBody.firstChild);
          postText = '';
          postContent.innerHTML = '';
          postCard.classList.add('hidden');
        },

        appendText(text) {
          postCard.classList.remove('hidden');
          postText += text;
          postContent.innerHTML = renderBold(postText);
          scrollToBottom();
        },

        finalize(messageId = null) {
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (postContent.textContent.trim()) {
            copyBtn.classList.remove('hidden');
            saveBtn.classList.remove('hidden');
          }
          scrollToBottom(true);
        },

        showError(msg) {
          errorEl.textContent = msg;
          errorEl.classList.remove('hidden');
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-red-500 font-bold text-xs">✗</span>';
        },

        appendThinking(text) {
          if (thinkingFinalized) return;
          thinkingSection.classList.remove('hidden');
          thinkingBuffer += text;

          const parts = thinkingBuffer.split('\n');
          for (let i = 0; i < parts.length - 1; i++) {
            const lineText = parts[i].trim();
            if (!lineText) continue;
            if (currentThoughtLine) currentThoughtLine = null;
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.textContent = lineText;
            thinkingBody.appendChild(line);
          }

          const partial = parts[parts.length - 1];
          if (partial) {
            if (!currentThoughtLine) {
              currentThoughtLine = document.createElement('div');
              currentThoughtLine.className = 'text-violet-400 opacity-70';
              thinkingBody.appendChild(currentThoughtLine);
            }
            currentThoughtLine.textContent = partial;
          }

          thinkingBuffer = partial;
          scrollToBottom();
        },

        finalizeThinking() {
          if (thinkingFinalized) return;
          thinkingFinalized = true;

          if (currentThoughtLine && currentThoughtLine.textContent.trim()) {
            currentThoughtLine.className = 'thought-line';
            currentThoughtLine = null;
          }

          const dotsEl = thinkingHeader.querySelector('.thinking-dots');
          if (dotsEl) {
            dotsEl.classList.remove('thinking-dots-active');
            dotsEl.classList.add('thinking-dots-done');
          }
          const statusEl = thinkingHeader.querySelector('.thinking-status');
          if (statusEl) statusEl.textContent = 'Thought for a moment';

          thinkingOpen = false;
          thinkingBody.classList.add('collapsed');
          thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
        },

        renderHistory(blocks) {
          if (!Array.isArray(blocks)) return;
          for (const block of blocks) {
            if (block.type === 'tool_use') {
              const inputSummary = Object.values(block.input || {}).join(' ').slice(0, 60);
              this.addToolCall(block.id, block.name, inputSummary);
              this.resolveToolCall(block.id, '');
            } else if (block.type === 'text' && block.text) {
              postCard.classList.remove('hidden');
              postText += block.text;
              postContent.innerHTML = renderBold(postText);
            } else if (block.type === 'thinking' && block.thinking) {
              thinkingSection.classList.remove('hidden');
              const line = document.createElement('div');
              line.className = 'text-violet-500 opacity-80';
              line.textContent = block.thinking.slice(0, 200) + (block.thinking.length > 200 ? '...' : '');
              thinkingBody.appendChild(line);
            }
          }
          if (!thinkingSection.classList.contains('hidden')) {
            const dotsEl = thinkingHeader.querySelector('.thinking-dots');
            if (dotsEl) { dotsEl.classList.remove('thinking-dots-active'); dotsEl.classList.add('thinking-dots-done'); }
            const statusEl = thinkingHeader.querySelector('.thinking-status');
            if (statusEl) statusEl.textContent = 'Thought for a moment';
            thinkingOpen = false;
            thinkingBody.classList.add('collapsed');
            thinkingHeader.querySelector('.thinking-chevron').style.transform = 'rotate(180deg)';
          }
          const iconWrap = traceHeader.querySelector('.trace-status-icon');
          if (iconWrap) iconWrap.innerHTML = '<span class="text-green-500 font-bold text-xs">✓</span>';
          traceOpen = false;
          traceBody.classList.add('collapsed');
          traceHeader.querySelector('.trace-chevron').style.transform = 'rotate(180deg)';
          if (postContent.textContent.trim()) copyBtn.classList.remove('hidden');
          if (Object.keys(toolRows).length === 0) traceWrap.classList.add('hidden');
          if (postContent.textContent.trim()) {
            saveBtn.classList.remove('hidden');
          }
        },
      };
    }

    // ════════════════════════════════════════════════════════════
    // API HELPERS
    // ════════════════════════════════════════════════════════════

    async function apiGet(path) {
      const r = await fetch(path);
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
      return r.json();
    }

    async function apiPost(path, body) {
      const r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
      return r.json();
    }

    async function apiPatch(path, body) {
      const r = await fetch(path, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok) throw new Error(`PATCH ${path} → ${r.status}`);
      return r.json();
    }

    async function apiDelete(path) {
      const r = await fetch(path, { method: 'DELETE' });
      if (r.status === 401) { showAuthModal(); throw new Error('Unauthorized'); }
      if (!r.ok && r.status !== 204) throw new Error(`DELETE ${path} → ${r.status}`);
    }

    function summariseInput(input) {
      if (!input) return '';
      if (typeof input === 'string') return input.slice(0, 60);
      const vals = Object.values(input);
      if (!vals.length) return '';
      return String(vals[0]).slice(0, 60);
    }

    // ════════════════════════════════════════════════════════════
    // CHAT MANAGEMENT
    // ════════════════════════════════════════════════════════════

    async function loadChatList() {
      try {
        const chats = await apiGet('/api/chats');
        sidebarList.innerHTML = '';
        const sorted = [...chats].sort((a, b) =>
          new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at)
        );
        sorted.forEach(c => renderSidebarItem(c));
        if (sorted.length > 0) {
          loadChat(sorted[0].id);
        } else {
          emptyState.style.display = '';
        }
      } catch (e) {
        console.error('Failed to load chat list', e);
        emptyState.style.display = '';
      }
    }

    async function loadChat(chatId) {
      const key = String(chatId);
      activeChatId = key;
      setActiveSidebarItem(key);
      updateSendStopButton();
      inputArea.disabled = chatStreams.has(key);

      // Cancel any active edit mode when switching chats
      editingFromMessageId = null;
      inputArea.classList.remove('editing-mode');

      // If we have a cached panel (e.g. streaming in background), just show it
      if (chatPanels[key]) {
        showPanel(key);
        document.title = "Roman's Agent";
        requestAnimationFrame(() => scrollToBottom(true));
        return;
      }

      try {
        const chat = await apiGet(`/api/chats/${chatId}`);
        document.title = chat.title ? `${chat.title} — Roman's Agent` : "Roman's Agent";

        if (!chat.messages || chat.messages.length === 0) {
          showPanel(key); // shows empty state since no panel exists yet
          inputArea.focus();
          return;
        }

        const panel = getOrCreatePanel(key);

        let lastShell = null;
        for (const msg of chat.messages) {
          if (msg.role === 'user') {
            const content = msg.content;
            if (Array.isArray(content)) {
              const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n');
              if (text) appendUserMessage(text, panel, msg.id);
              // Restore images stored in tool_results
              if (lastShell) {
                content.forEach(b => {
                  if (b.type === 'tool_result' && Array.isArray(b.__images__) && b.__images__.length > 0) {
                    lastShell.addImages(b.__images__);
                  }
                });
              }
            } else {
              appendUserMessage(content || msg.text || '', panel, msg.id);
            }
          } else if (msg.role === 'assistant') {
            lastShell = createAssistantMessageShell(panel);
            const content = msg.content;
            if (Array.isArray(content)) {
              lastShell.renderHistory(content);
            } else if (typeof content === 'string') {
              lastShell.renderHistory([{ type: 'text', text: content }]);
            }
          }
        }

        showPanel(key);
        requestAnimationFrame(() => scrollToBottom(true));
        inputArea.focus();
      } catch (e) {
        console.error('Failed to load chat', e);
        emptyState.style.display = '';
      }
    }

    async function createNewChat() {
      try {
        const chat = await apiPost('/api/chats', {});
        renderSidebarItem(chat);
        activeChatId = String(chat.id);
        setActiveSidebarItem(activeChatId);
        // Show empty state for the new chat
        Object.values(chatPanels).forEach(p => { p.style.display = 'none'; });
        emptyState.style.display = '';
        document.title = "Roman's Agent";
        inputArea.focus();
      } catch (e) {
        console.error('Failed to create chat', e);
      }
    }

    async function deleteChat(chatId) {
      try {
        await apiDelete(`/api/chats/${chatId}`);
      } catch (e) {
        console.error('Failed to delete chat', e);
      }
      const item = document.getElementById(`chat-item-${chatId}`);
      if (item) item.remove();
      deletePanel(chatId);

      if (String(chatId) === activeChatId) {
        activeChatId = null;
        const firstItem = sidebarList.querySelector('.chat-item');
        if (firstItem) {
          loadChat(firstItem.dataset.chatId);
        } else {
          emptyState.style.display = '';
          document.title = "Roman's Agent";
        }
      }
    }

    // ════════════════════════════════════════════════════════════
    // SEND MESSAGE + SSE STREAMING
    // ════════════════════════════════════════════════════════════

    const BTN_BASE = 'shrink-0 flex items-center gap-1.5 text-white text-sm font-medium rounded-xl px-4 py-2.5 transition';
    function updateSendStopButton() {
      const isStreamingHere = chatStreams.has(activeChatId);
      if (isStreamingHere) {
        sendBtn.className = `${BTN_BASE} bg-red-600 hover:bg-red-500 active:bg-red-700`;
        sendBtn.innerHTML = '<span>Stop</span><span class="text-base leading-none">■</span>';
      } else {
        sendBtn.className = `${BTN_BASE} bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700`;
        sendBtn.innerHTML = '<span>Send</span><span class="text-base leading-none">↩</span>';
      }
    }

    function editMessage(text, messageId) {
      if (chatStreams.has(activeChatId)) return;
      inputArea.value = text;
      inputArea.style.height = 'auto';
      inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
      editingFromMessageId = messageId;
      inputArea.classList.add('editing-mode');
      inputArea.focus();
    }

    async function sendMessage() {
      const text = inputArea.value.trim();
      if (!text || chatStreams.has(activeChatId)) return;

      // Edit-and-resend: truncate DB + remove DOM from that message onward
      if (editingFromMessageId && activeChatId) {
        inputArea.classList.remove('editing-mode');
        try {
          await apiDelete(`/api/chats/${activeChatId}/messages/since/${editingFromMessageId}`);
          const panel = chatPanels[String(activeChatId)];
          if (panel) {
            let removing = false;
            [...panel.children].forEach(child => {
              if (!removing && child.dataset?.messageId === String(editingFromMessageId)) removing = true;
              if (removing) child.remove();
            });
          }
        } catch (e) {
          console.error('Failed to truncate messages for edit', e);
        }
        editingFromMessageId = null;
      }

      if (!activeChatId) {
        try {
          const chat = await apiPost('/api/chats', {});
          renderSidebarItem(chat);
          activeChatId = String(chat.id);
          setActiveSidebarItem(activeChatId);
        } catch (e) {
          console.error('Failed to create chat', e);
          return;
        }
      }

      const thisChatId = activeChatId;
      const panel = getOrCreatePanel(thisChatId);
      appendUserMessage(text, panel);
      inputArea.value = '';
      inputArea.style.height = '';

      const ctrl = new AbortController();
      chatStreams.set(thisChatId, ctrl);
      updateSendStopButton();
      inputArea.disabled = true;
      // Show streaming dot on sidebar item
      const streamItem = document.getElementById(`chat-item-${thisChatId}`);
      if (streamItem && !streamItem.querySelector('.chat-streaming-dot')) {
        const dot = document.createElement('div');
        dot.className = 'chat-streaming-dot';
        streamItem.insertBefore(dot, streamItem.querySelector('.delete-btn'));
      }

      const shell = createAssistantMessageShell(panel);

      try {
        const resp = await fetch(`/api/chats/${thisChatId}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
          signal: ctrl.signal,
        });

        if (!resp.ok) {
          let detail = `Server error ${resp.status}`;
          try { const j = await resp.json(); if (j.detail) detail = j.detail; } catch {}
          shell.showError(detail);
          chatStreams.delete(thisChatId);
          if (activeChatId === thisChatId) { updateSendStopButton(); inputArea.disabled = false; }
          return;
        }

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(part.slice(6)); } catch { continue; }
            handleSSEEvent(event, shell, thisChatId);
          }
        }

      } catch (e) {
        if (e.name === 'AbortError') {
          shell.finalize();
        } else {
          shell.showError(e.message || 'Network error');
        }
      } finally {
        chatStreams.delete(thisChatId);
        // Remove streaming dot from sidebar item
        const doneItem = document.getElementById(`chat-item-${thisChatId}`);
        if (doneItem) doneItem.querySelector('.chat-streaming-dot')?.remove();
        if (activeChatId === thisChatId) {
          updateSendStopButton();
          inputArea.disabled = false;
          inputArea.focus();
        }
      }
    }

    function handleSSEEvent(event, shell, thisChatId) {
      switch (event.type) {
        case 'thinking_delta':
          shell.appendThinking(event.text || '');
          break;
        case 'tool_call':
          shell.movePendingToNotes();
          shell.finalizeThinking();
          shell.addToolCall(event.id, event.tool, summariseInput(event.input));
          break;
        case 'tool_result':
          shell.resolveToolCall(event.id, event.preview || '', event.images || []);
          break;
        case 'text_delta':
          shell.finalizeThinking();
          shell.appendText(event.text || '');
          break;
        case 'title':
          if (event.title) {
            if (activeChatId === String(thisChatId))
              document.title = `${event.title} — Roman's Agent`;
            updateSidebarTitle(thisChatId, event.title);
          }
          break;
        case 'thumbnail':
          if (event.url) updateSidebarThumbnail(thisChatId, event.url);
          break;
        case 'done':
          shell.finalize();
          break;
        case 'error':
          shell.showError(event.message || 'An error occurred');
          break;
        default:
          break;
      }
    }

    // ════════════════════════════════════════════════════════════
    // INPUT EVENT WIRING
    // ════════════════════════════════════════════════════════════

    sendBtn.addEventListener('click', () => {
      const ctrl = chatStreams.get(activeChatId);
      if (ctrl) {
        ctrl.abort();
      } else {
        sendMessage();
      }
    });

    inputArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputArea.addEventListener('input', () => {
      inputArea.style.height = 'auto';
      inputArea.style.height = Math.min(inputArea.scrollHeight, 96) + 'px';
    });

    newChatBtn.addEventListener('click', createNewChat);

    // ════════════════════════════════════════════════════════════
    // MOBILE DRAWER
    // ════════════════════════════════════════════════════════════

    function openSidebar() {
      sidebar.classList.add('open');
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }
    menuToggle.addEventListener('click', openSidebar);
    backdrop.addEventListener('click', closeSidebar);

    // ════════════════════════════════════════════════════════════
    // SIDEBAR TABS
    // ════════════════════════════════════════════════════════════

    function switchTab(tab) {
      currentTab = tab;
      tabChats.classList.toggle('active', tab === 'chats');
      tabLibrary.classList.toggle('active', tab === 'library');
      newChatWrap.style.display = tab === 'chats' ? '' : 'none';
      if (tab === 'library') {
        renderLibraryList();
      } else {
        loadChatList();
      }
    }
    tabChats.addEventListener('click', () => switchTab('chats'));
    tabLibrary.addEventListener('click', () => switchTab('library'));

    // ════════════════════════════════════════════════════════════
    // LIBRARY
    // ════════════════════════════════════════════════════════════

    async function renderLibraryList() {
      try {
        const items = await apiGet('/api/library');
        sidebarList.innerHTML = '';
        if (items.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'text-xs text-slate-500 px-3 py-4 text-center';
          empty.textContent = 'No saved posts yet.';
          sidebarList.appendChild(empty);
          return;
        }
        items.forEach(item => sidebarList.appendChild(renderLibraryItem(item)));
      } catch (e) {
        console.error('Failed to load library', e);
      }
    }

    function renderLibraryItem(item) {
      const el = document.createElement('div');
      el.className = 'library-item rounded-lg px-3 py-2.5 mb-1 cursor-pointer';
      el.dataset.libId = item.id;

      const preview = document.createElement('p');
      preview.className = 'text-xs text-slate-300 leading-relaxed line-clamp-3 mb-2';
      preview.style.cssText = 'display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden';
      preview.textContent = item.text;

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-1.5 flex-wrap';

      const statusBadge = document.createElement('span');
      statusBadge.className = `lib-status-badge ${item.status}`;
      statusBadge.textContent = item.status;

      if (item.promoted) {
        const promBadge = document.createElement('span');
        promBadge.className = 'lib-status-badge promoted';
        promBadge.textContent = '✓ archive';
        meta.appendChild(promBadge);
      }

      const date = document.createElement('span');
      date.className = 'text-[10px] text-slate-500 ml-auto';
      date.textContent = item.created_at ? new Date(item.created_at).toLocaleDateString('he-IL') : '';

      meta.appendChild(statusBadge);
      meta.appendChild(date);
      el.appendChild(preview);
      el.appendChild(meta);

      // Actions row
      const actions = document.createElement('div');
      actions.className = 'flex gap-2 mt-2';

      const copyBtn2 = document.createElement('button');
      copyBtn2.className = 'text-[11px] text-slate-400 hover:text-indigo-400 transition';
      copyBtn2.textContent = '📋';
      copyBtn2.title = 'Copy';
      copyBtn2.addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard.writeText(item.text).then(() => { copyBtn2.textContent = '✓'; setTimeout(() => copyBtn2.textContent = '📋', 1500); });
      });

      const postBtn = document.createElement('button');
      postBtn.className = 'text-[11px] text-slate-400 hover:text-green-400 transition';
      postBtn.title = item.status === 'posted' ? 'Mark as draft' : 'Mark as posted';
      postBtn.textContent = item.status === 'posted' ? '↩ Draft' : '✅ Posted';
      postBtn.addEventListener('click', async e => {
        e.stopPropagation();
        const newStatus = item.status === 'posted' ? 'draft' : 'posted';
        try {
          const updated = await apiPatch(`/api/library/${item.id}`, { status: newStatus });
          item.status = updated.status;
          item.posted_at = updated.posted_at;
          statusBadge.className = `lib-status-badge ${updated.status}`;
          statusBadge.textContent = updated.status;
          postBtn.textContent = updated.status === 'posted' ? '↩ Draft' : '✅ Posted';
          postBtn.title = updated.status === 'posted' ? 'Mark as draft' : 'Mark as posted';
        } catch (err) { console.error(err); }
      });

      const archiveBtn = document.createElement('button');
      archiveBtn.className = 'text-[11px] transition ' + (item.promoted ? 'text-violet-400 cursor-default' : 'text-slate-400 hover:text-violet-400');
      archiveBtn.textContent = item.promoted ? '✓ archive' : '🎓 archive';
      archiveBtn.title = item.promoted ? 'Already in style archive' : 'Add to style archive';
      archiveBtn.disabled = item.promoted;
      archiveBtn.addEventListener('click', async e => {
        e.stopPropagation();
        if (item.promoted) return;
        const ok = confirm('Add to style archive? The bot will learn to write like this post.');
        if (!ok) return;
        try {
          await apiPost(`/api/library/${item.id}/promote`, {});
          item.promoted = true;
          archiveBtn.textContent = '✓ archive';
          archiveBtn.className = 'text-[11px] text-violet-400 cursor-default';
          archiveBtn.disabled = true;
          const promBadge = document.createElement('span');
          promBadge.className = 'lib-status-badge promoted';
          promBadge.textContent = '✓ archive';
          meta.insertBefore(promBadge, date);
        } catch (err) { console.error(err); }
      });

      const delBtn2 = document.createElement('button');
      delBtn2.className = 'text-[11px] text-slate-500 hover:text-red-400 transition ml-auto';
      delBtn2.textContent = '🗑';
      delBtn2.title = 'Delete';
      delBtn2.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Delete this saved post?')) return;
        try {
          await apiDelete(`/api/library/${item.id}`);
          el.remove();
        } catch (err) { console.error(err); }
      });

      actions.appendChild(copyBtn2);
      actions.appendChild(postBtn);
      actions.appendChild(archiveBtn);
      actions.appendChild(delBtn2);
      el.appendChild(actions);

      return el;
    }

    // Called from assistant message shell to save a post
    async function saveToLibrary(text, chatId, messageId) {
      try {
        const result = await apiPost('/api/library', { text, chat_id: chatId ? Number(chatId) : null, message_id: messageId ? Number(messageId) : null });
        return result;
      } catch (e) {
        console.error('Failed to save to library', e);
        return null;
      }
    }

    // ════════════════════════════════════════════════════════════
    // AUTH
    // ════════════════════════════════════════════════════════════

    const authModal  = document.getElementById('auth-modal');
    const authInput  = document.getElementById('auth-input');
    const authSubmit = document.getElementById('auth-submit');
    const authError  = document.getElementById('auth-error');

    function showAuthModal() {
      authModal.classList.add('open');
      setTimeout(() => authInput.focus(), 50);
    }
    function hideAuthModal() {
      authModal.classList.remove('open');
      authInput.value = '';
      authError.classList.add('hidden');
    }

    async function submitLogin() {
      const pw = authInput.value.trim();
      if (!pw) return;
      authSubmit.disabled = true;
      authSubmit.textContent = 'Signing in…';
      try {
        await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        }).then(async r => {
          if (!r.ok) {
            authError.textContent = 'Wrong password';
            authError.classList.remove('hidden');
            return;
          }
          hideAuthModal();
          loadChatList();
        });
      } catch (e) {
        authError.textContent = 'Network error';
        authError.classList.remove('hidden');
      } finally {
        authSubmit.disabled = false;
        authSubmit.textContent = 'Sign in';
      }
    }

    authSubmit.addEventListener('click', submitLogin);
    authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitLogin(); });

    // ════════════════════════════════════════════════════════════
    // BOOT
    // ════════════════════════════════════════════════════════════

    async function boot() {
      try {
        const r = await fetch('/api/auth/check');
        const data = await r.json();
        if (!data.authenticated) {
          showAuthModal();
          return;
        }
      } catch (e) {
        // No auth configured or network error — proceed
      }
      loadChatList();
    }

    boot();

  })();
  </script>
